<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://script.google.com https://script.googleusercontent.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src *;">
<title>CRM · Funil de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --blue:  #1a3a8c;
  --blue2: #2452b8;
  --blue3: #3a6fd8;
  --red:   #cc1a1a;
  --red2:  #e52828;
  --white: #ffffff;
  --off:   #f4f6fb;
  --gray:  #e8ecf5;
  --gray2: #c8d0e0;
  --text:  #0f1f4a;
  --text2: #4a5878;
  --text3: #8a97b8;
  --sh:    0 4px 24px rgba(26,58,140,.10);
  --sh2:   0 8px 40px rgba(26,58,140,.18);
  --r:     14px;
  --g-pos: #1a8c4e;
  --g-nav: #cc1a1a;
  --g-cnt: #1a3a8c;
  --g-car: #b87a00;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--off);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--blue);box-shadow:var(--sh);overflow:hidden;min-height:100px}
.hdr-wave{position:absolute;inset:0;pointer-events:none}
.hdr-wave::before{content:'';position:absolute;top:-30px;right:-60px;width:28%;height:200%;
  background:var(--red);transform:skewX(-12deg);border-radius:0}
.hdr-wave::after{content:'';position:absolute;top:-30px;right:-90px;width:20%;height:200%;
  background:var(--red2);opacity:.6;transform:skewX(-12deg)}
.hdr-swoosh{display:none}
.hdr-inner{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:22px 36px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:14px}
.logo-ico{width:50px;height:50px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.logo-txt .t1{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--white)}
.logo-txt .t2{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.upd{font-family:'Roboto Mono',monospace;font-size:11px;color:rgba(255,255,255,.6)}
.btn{padding:9px 20px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.3px}
.btn-w{background:var(--white);color:var(--blue)}.btn-w:hover{background:var(--gray)}
.btn-r{background:var(--red2);color:var(--white);border:1.5px solid rgba(255,255,255,.2)}.btn-r:hover{background:var(--red)}
.btn.ld{opacity:.6;pointer-events:none}

/* ── TOAST DE CONEXÃO ── */
#conn-toast{position:fixed;bottom:24px;right:24px;z-index:999;max-width:420px;background:#0f1f4a;color:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,.35);font-size:12px;display:none;border-left:4px solid var(--red2)}
#conn-toast.show{display:block;animation:slideIn .3s ease}
#conn-toast .ct-title{font-weight:800;font-size:13px;margin-bottom:6px;color:#ff6b6b}
#conn-toast .ct-body{color:rgba(255,255,255,.8);line-height:1.5}
#conn-toast .ct-close{position:absolute;top:10px;right:12px;cursor:pointer;opacity:.6;font-size:15px}
#conn-toast .ct-close:hover{opacity:1}
#conn-progress{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue2),var(--blue3));z-index:200;transform:scaleX(0);transform-origin:left;transition:transform .4s ease;display:none}
#conn-progress.active{display:block;animation:loadBar 1.8s ease-in-out infinite alternate}
@keyframes loadBar{from{transform:scaleX(.1)}to{transform:scaleX(.9)}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ── SETTINGS ── */
.sett{display:none;background:var(--white);border-bottom:2px solid var(--gray);padding:22px 36px}
.sett.open{display:block}
.sett-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:14px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.fl input{background:var(--off);border:1.5px solid var(--gray2);border-radius:8px;padding:8px 12px;font-family:'Roboto Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
.fl input:focus{border-color:var(--blue2)}

/* ── TABS ── */
.tabs{background:var(--white);border-bottom:2px solid var(--gray);padding:0 36px;display:flex;gap:4px;overflow-x:auto}
.vtab{padding:13px 22px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--text3);white-space:nowrap;transition:all .2s;user-select:none}
.vtab:hover{color:var(--blue2)}.vtab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── DATE BAR ── */
.dbar{background:var(--white);border-bottom:2px solid var(--gray);padding:11px 36px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.dchip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray2);background:var(--white);color:var(--text2);transition:all .2s}
.dchip:hover{border-color:var(--blue2);color:var(--blue)}.dchip.active{background:var(--blue);border-color:var(--blue);color:var(--white)}
.dinp{background:var(--off);border:1.5px solid var(--gray2);border-radius:8px;padding:5px 11px;font-family:'Roboto Mono',monospace;font-size:12px;color:var(--text);outline:none}
.dinp:focus{border-color:var(--blue2)}

/* ── MAIN ── */
main{padding:26px 36px;max-width:1600px;margin:0 auto}

/* ── KPI ── */
.kpi-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--white);border-radius:var(--r);padding:20px 18px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:4px;background:var(--kc,var(--blue));border-radius:var(--r) var(--r) 0 0}
.kpi-ico{position:absolute;top:14px;right:14px;font-size:30px;opacity:.1}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:9px}
.kpi-val{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:5px}
.kpi-val.sm{font-size:19px}.kpi-val.lg{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:800}.kpi-sub{font-size:11px;color:var(--text3);font-weight:500}

/* ── SECTION TITLE ── */
.stitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';display:inline-block;width:4px;height:16px;background:var(--al,var(--blue));border-radius:2px}

/* ── STAGE CARDS ── */
.stg-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
@media(max-width:900px){.stg-row{grid-template-columns:repeat(2,1fr)}}
.stg{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border-top:4px solid var(--sc,var(--blue));position:relative;overflow:hidden;transition:transform .2s}
.stg:hover{transform:translateY(-2px)}
.stg-arr{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:30px;opacity:.07}
.stg-nm{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--sc,var(--blue));margin-bottom:8px}
.stg-ct{font-family:'Roboto Mono',monospace;font-size:36px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.stg-pc{font-size:11px;color:var(--text3);font-weight:600}
.stg-trk{margin-top:10px;height:5px;background:var(--gray);border-radius:4px;overflow:hidden}
.stg-fil{height:100%;border-radius:4px;background:var(--sc,var(--blue));transition:width .8s cubic-bezier(.23,1,.32,1)}

/* ── CHARTS ── */
.ch-row{display:grid;grid-template-columns:1fr 350px;gap:18px;margin-bottom:22px}
@media(max-width:1100px){.ch-row{grid-template-columns:1fr}}
.ch-card{background:var(--white);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.ch-wrap{position:relative;height:265px}

/* ── FUNNEL LIST ── */
.fn-list{display:flex;flex-direction:column;gap:11px}
.fn-row{display:flex;align-items:center;gap:10px}
.fn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fn-nm{font-size:12px;font-weight:600;color:var(--text2);width:108px;flex-shrink:0}
.fn-trk{flex:1;height:26px;background:var(--gray);border-radius:6px;overflow:hidden}
.fn-fil{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;transition:width .9s cubic-bezier(.23,1,.32,1)}
.fn-fil span{font-family:'Roboto Mono',monospace;font-size:11px;font-weight:500;color:#fff;white-space:nowrap}
.fn-pc{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500;color:var(--text3);width:40px;text-align:right;flex-shrink:0}

/* ── VENDOR CARDS ── */
.vnd-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:22px}
.vnd{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border-left:4px solid var(--blue)}
.vnd:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-left-color:var(--red)}
.vnd-h{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.vnd-av{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.vnd-nm{font-size:15px;font-weight:800;color:var(--text)}.vnd-sb{font-size:11px;color:var(--text3);font-family:'Roboto Mono',monospace}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mini-s{background:var(--off);border-radius:6px;padding:7px 4px;text-align:center}
.mini-v{font-family:'Roboto Mono',monospace;font-size:16px;font-weight:500}
.mini-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:2px}

/* ── TABLE ── */
.tbl-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:28px}
.tbl-hd{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:linear-gradient(90deg,var(--blue),var(--blue2))}
.tbl-ti{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff}
.tbl-srch{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:7px 14px;color:#fff;font-family:'Roboto Mono',monospace;font-size:12px;outline:none;width:210px}
.tbl-srch::placeholder{color:rgba(255,255,255,.5)}.tbl-srch:focus{border-color:rgba(255,255,255,.7)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--off);border-bottom:2px solid var(--gray);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray);transition:background .12s}
tbody tr:hover{background:rgba(26,58,140,.03)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:11px 18px;font-size:13px;color:var(--text2);white-space:nowrap}
tbody td:first-child{font-weight:700;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}

/* ── STATES ── */
.st-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--text3);gap:14px;text-align:center}
.st-ico{font-size:44px;opacity:.3}.st-box p{font-size:14px;font-weight:600}
.spin{width:36px;height:36px;border:3px solid var(--gray);border-top-color:var(--blue);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:#fff3f3;border:1.5px solid #ffc5c5;border-radius:10px;padding:12px 18px;color:var(--red);font-size:13px;font-weight:600;margin-bottom:18px;display:none}
.err.on{display:block}
.fin{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── STAGE FILTER CHIPS (tabela) ── */
.stg-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray2);background:var(--white);color:var(--text2);transition:all .2s;white-space:nowrap}
.stg-chip:hover{border-color:var(--cc,var(--blue2));color:var(--cc,var(--blue))}
.stg-chip.active{background:var(--cc,var(--blue));border-color:var(--cc,var(--blue));color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--gray)}
::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:4px}
@media(max-width:1100px){.ch-row{grid-template-columns:1fr};[style*="grid-template-columns:1fr 300px"]{grid-template-columns:1fr!important}}
@media(max-width:768px){.hdr-inner,main{padding-left:16px;padding-right:16px}.tabs,.dbar{padding-left:16px;padding-right:16px}.kpi-val{font-size:22px}}
</style>
</head>
<body>

<!-- PROGRESS BAR -->
<div id="conn-progress"></div>

<!-- CONNECTION TOAST -->
<div id="conn-toast">
  <span class="ct-close" onclick="document.getElementById('conn-toast').classList.remove('show')">✕</span>
  <div class="ct-title" id="ct-title">Erro de Conexão</div>
  <div class="ct-body" id="ct-body"></div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-wave"></div>
  <div class="hdr-swoosh"></div>
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-ico">📊</div>
      <div class="logo-txt">
        <div class="t1">CRM · Funil de Vendas</div>
        <div class="t2">Consolidado de Vendedores</div>
      </div>
    </div>
    <div class="hdr-r">
      <span class="upd" id="upd">—</span>
      <button class="btn btn-w" id="btn-ref" onclick="loadData()">↻ Atualizar</button>
      <button class="btn btn-r" onclick="toggleSett()">⚙ Configurar</button>
      <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.3)" onclick="showDebug()">🔍 Debug</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="sett" id="sett">
  <div class="sett-g">
    <div class="fl"><label>ID da Planilha</label><input id="s-id" value="1kL0VeAavKt8SwadCOxkvS3BxklZeYnr-huwuobaqPAA"></div>
    <div class="fl"><label>Abas dos Vendedores (vírgula)</label><input id="s-sh" value="ADRIANO, ALEX, AUGUSTO, BRUNO, DEBORAH, DENIS, DOUGLAS, JOYCE, LEANDRO, LUCAS, MARCELO, MATEUS, NOA, RAFAEL, ROSANE, THAIS, WESLEY, ALINE, CINTIA, KEULLY"></div>
    <div class="fl"><label>Col. Grupo Comercial</label><input id="s-cl" value="GRUPO COMERCIAL"></div>
    <div class="fl"><label>Col. Data Envio</label><input id="s-dt" value="DATA ENVIO"></div>
    <div class="fl"><label>Col. Fat. Mês</label><input id="s-vl" value="FAT. MÊS"></div>
    <div class="fl"><label>Col. Carteira</label><input id="s-ca" value="CARTEIRA"></div>
    <div class="fl"><label>Col. Dias Contato</label><input id="s-co" value="DIAS CONTATO"></div>
    <div class="fl"><label>Col. Não Venda</label><input id="s-mo" value="NÃO VENDA"></div>
  </div>
  <button class="btn" style="background:var(--blue);color:#fff" onclick="saveSett()">💾 Salvar e Recarregar</button>
  <div style="margin-top:20px;border-top:1px solid var(--gray);padding-top:16px">
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Vendedores — Última Atualização</div>
    <div id="sett-vendors" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;font-size:12px"></div>
  </div>
</div>

<!-- DEBUG MODAL -->
<div id="dbg-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;overflow:auto;padding:30px">
  <div style="background:#0f1f4a;border-radius:14px;padding:28px;max-width:1100px;margin:0 auto;color:#e8ecf0;font-family:'Roboto Mono',monospace;font-size:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff">🔍 Debug — Dados Brutos</div>
      <button onclick="document.getElementById('dbg-overlay').style.display='none'" style="background:rgba(255,255,255,.1);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px">✕ Fechar</button>
    </div>
    <div id="dbg-content"></div>
  </div>
</div>

<div class="tabs" style="display:flex;align-items:center;gap:0">
  <div id="tab-all" class="vtab active" onclick="setGroup('all');document.querySelectorAll('.vtab').forEach(v=>v.classList.remove('active'));this.classList.add('active')">🌐 Todos</div>
  <div id="btn-farmer" class="vtab" onclick="setGroup('farmer')" style="color:#b87a00">🌾 Farmer</div>
  <div id="btn-developer" class="vtab" onclick="setGroup('developer')" style="color:#1a3a8c">💻 Developer</div>
  <div style="width:1px;height:24px;background:rgba(0,0,0,.12);margin:0 4px"></div>
  <div id="tabs" style="display:flex;overflow-x:auto"></div>
</div>

<!-- MTD CARDS BAR -->
<div id="mtd-bar" style="display:none;padding:10px 36px;background:var(--off);border-bottom:1px solid var(--gray)">
  <div id="mtd-cards" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:600px"></div>
</div>

<!-- DATE BAR -->
<div class="dbar" id="dbar" style="display:none">
  <span class="dlbl">📅 Período:</span>
  <div class="dchip active" onclick="setPeriod('all',this)">Todos</div>
  <div class="dchip" onclick="setPeriod('1',this)">Últ. Dia</div>
  <div class="dchip" onclick="setPeriod('7',this)">7 dias</div>
  <div class="dchip" onclick="setPeriod('mtd',this)">MTD</div>
  <div class="dchip" onclick="setPeriod('custom',this)">Personalizado</div>
  <input type="date" class="dinp" id="d-from" style="display:none" onchange="applyDates()">
  <span id="d-sep" style="display:none;color:var(--text3);font-size:12px">até</span>
  <input type="date" class="dinp" id="d-to" style="display:none" onchange="applyDates()">
</div>

<!-- MAIN -->
<main>
  <div class="err" id="err"></div>
  <div id="mc">
    <div class="st-box"><div class="spin"></div><p>Carregando dados da planilha…</p></div>
  </div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────
const C = {
  id:  '1kL0VeAavKt8SwadCOxkvS3BxklZeYnr-huwuobaqPAA',
  sh:  ['ADRIANO','ALEX','AUGUSTO','BRUNO','DEBORAH','DENIS','DOUGLAS','JOYCE','LEANDRO','LUCAS','MARCELO','MATEUS','NOA','RAFAEL','ROSANE','THAIS','WESLEY','ALINE','CINTIA','KEULLY'],
  cl:  'GRUPO COMERCIAL',
  cn:  'CLIENTE',
  dt:  'DATA ENVIO',
  vl:  'FAT. MÊS',
  ca:  'CARTEIRA',
  co:  'DIAS CONTATO',
  mo:  'NÃO VENDA',
  mo2: 'MOTIVO',
  meta:'META FAT.',
  metaPos: 'META POSIT.',
  positMes: 'POSIT. MÊS',
  dv:  'DIAS VENDA',
};

const STAGES = [
  { key:'positivado',  lbl:'Positivado',  col:'#1a8c4e', bg:'#e6f7ee' },

// ── FETCH: carrega todos de uma vez via action=export ────────────
async function loadAllFromAppsScript() {
  const url = `${APPS_SCRIPT_URL}?action=export&t=${Date.now()}`;
  console.log('%c🔄 Apps Script Export', 'color:#1a3a8c;font-weight:bold', url);

  // AbortController com timer explícito (mais confiável que IIFE)
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 40000);

  try {
    const r = await fetch(url, { redirect: 'follow', signal: ctrl.signal });
    clearTimeout(timer);
    console.log('%c📡 HTTP Response', 'color:#888',
      `status=${r.status} ok=${r.ok} type=${r.type}`);

    if (!r.ok) {
      console.error(`❌ Apps Script HTTP ${r.status}`);
      showToast('Apps Script indisponível',
        `HTTP ${r.status} — Reimplante o Apps Script:<br>
        <b>Implantar → Gerenciar implantações → Editar → Nova versão</b>`);
      return null;
    }

    const txt = await r.text();
    console.log('%c📦 Raw (primeiros 500)', 'color:#888', txt.slice(0, 500));

    // Detecta resposta HTML (erro de autenticação ou implantação errada)
    if (txt.trim().startsWith('<!') || txt.trim().startsWith('<html')) {
      console.error('❌ Apps Script retornou HTML — não está implantado como App da Web público');
      showToast('Apps Script não configurado',
        'A implantação retornou uma página HTML em vez de JSON.<br>' +
        'Verifique: <b>Implantar → Gerenciar → acesso "Qualquer pessoa"</b>');
      return null;
    }

    let data;
    try {
      data = JSON.parse(txt);
    } catch(parseErr) {
      console.error('❌ JSON inválido:', parseErr.message, '\nRaw:', txt.slice(0, 300));
      showToast('Resposta inválida do Apps Script',
        `Não foi possível ler o JSON: ${parseErr.message}<br>
        <small style="opacity:.7">Raw: ${txt.slice(0,80)}</small>`);
      return null;
    }

    // Erro explícito do script
    if (data && data.error) {
      console.error('❌ Apps Script error:', data.error);
      showToast('Erro no Apps Script', `${data.error}`);
      return null;
    }

    // Formato esperado: { status:'ok', vendedores: { ADRIANO:[...], ... } }
    if (data && data.status === 'ok' && data.vendedores) {
      const allNames = Object.keys(data.vendedores);
      const filtered = {};
      allNames.forEach(nome => {
        if (C.sh.includes(nome)) filtered[nome] = data.vendedores[nome];
        else console.log(`⚠️ Aba "${nome}" ignorada (fora da lista)`);
      });
      const count = Object.keys(filtered).length;
      console.log(`%c✅ Export OK: ${count} vendedores`, 'color:#1a8c4e;font-weight:bold',
        `(${allNames.length} abas na planilha)`);
      if (count === 0) {
        showToast('Nenhum vendedor encontrado',
          `A planilha tem ${allNames.length} aba(s) mas nenhuma corresponde à lista configurada.<br>
          Abas encontradas: <b>${allNames.join(', ')}</b><br>
          Lista configurada: <b>${C.sh.join(', ')}</b>`, true);
      }
      return filtered;
    }

    // Formato alternativo: { ADRIANO:[...], ALEX:[...] } (sem wrapper status/vendedores)
    if (data && typeof data === 'object' && !Array.isArray(data)) {
      const keys = Object.keys(data);
      if (keys.length > 0 && Array.isArray(data[keys[0]])) {
        console.log('%c✅ Export (formato alternativo)', 'color:#1a8c4e;font-weight:bold', `${keys.length} abas`);
        const filtered = {};
        keys.forEach(nome => { if (C.sh.includes(nome)) filtered[nome] = data[nome]; });
        return filtered;
      }
    }

    // Resposta desconhecida
    console.error('❌ Estrutura inesperada:', JSON.stringify(data).slice(0, 300));
    showToast('Resposta inesperada do Apps Script',
      `Estrutura não reconhecida. Verifique se o código do Apps Script está correto.<br>
      <small style="opacity:.7">Primeiros 100 chars: ${JSON.stringify(data).slice(0,100)}</small>`);
    return null;

  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') {
      console.error('❌ Timeout 40s — Apps Script não respondeu');
      showToast('Timeout do Apps Script',
        'O Apps Script não respondeu em 40 segundos.<br>' +
        'A planilha pode estar muito grande ou o script com erro de execução.');
    } else {
      console.error('❌ Fetch error:', e.name, e.message);
      showToast('Erro de conexão',
        `${e.message}<br><small style="opacity:.7">Tipo: ${e.name}</small>`);
    }
    return null;
  }
}

async function fetchSheet(name) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const url = `${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(name)}&t=${Date.now()}`;
    const r = await fetch(url, { redirect: 'follow', signal: ctrl.signal });
    clearTimeout(timer);
    if (r.ok) {
      const data = await r.json();
      if (data?.rows?.length > 0) {
        const rows = parseAppsScript(data, name);
        console.log(`✅ ${name} — ${rows.length} clientes`);
        return rows;
      }
      console.log(`📭 "${name}": ${data?.error || 'vazio'}`);
      return [];
    }
  } catch(e) {
    clearTimeout(timer);
    console.warn(`❌ "${name}":`, e.message);
  }
  return [];
}

// ── APPS SCRIPT PARSER ───────────────────────────────────
function parseAppsScript(json, vendor) {
  const { headers, rows } = json;
  if (!headers || !rows) return [];

  DATA['__cols__' + vendor] = headers;

  const fi = (name) => {
    if (!name) return -1;
    const n = name.toLowerCase().trim();
    let i = headers.findIndex(h => h.toLowerCase().trim() === n);
    if (i < 0) i = headers.findIndex(h => h.toLowerCase().trim().includes(n));
    return i;
  };

  const iCl=fi(C.cl), iCn=fi(C.cn||'CLIENTE'), iDt=fi(C.dt), iVl=fi(C.vl), iCa=fi(C.ca),
        iCo=fi(C.co), iMo=fi(C.mo), iMo2=fi('MOTIVO'),
        iMeta=fi(C.meta), iMetaPos=fi(C.metaPos||'META POSIT.'), iPositMes=fi(C.positMes||'POSIT. MÊS'), iDv=fi(C.dv);

  console.log(`📊 ${vendor} headers[${headers.length}]:`, headers.join(' | '));
  console.log(`   META FAT.[${iMeta}] META POSIT.[${iMetaPos}] POSIT.MÊS[${iPositMes}] FAT.MÊS[${iVl}]`);

  const get = (row, key) => key ? (row[key] || '').trim() : '';
  const num = (s) => parseFloat((s||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;

  const result = [];
  for (const row of rows) {
    const clientRaw = iCl >= 0 ? get(row, headers[iCl]) : '';
    const dateStr   = iDt >= 0 ? get(row, headers[iDt]) : '';
    if (!clientRaw && !dateStr) continue;
    const motivoNV  = iMo  >= 0 ? get(row, headers[iMo])  : '';
    const motivoMot = iMo2 >= 0 ? get(row, headers[iMo2]) : '';
    result.push({
      vendor,
      client:    clientRaw.replace(/\.0+$/, ''),
      clientName: iCn >= 0 ? get(row, headers[iCn]) : '',
      dateRaw:   dateStr,
      date:      pDate(dateStr),
      value:     iVl   >= 0 ? num(get(row, headers[iVl]))   : 0,
      meta:      iMeta >= 0 ? num(get(row, headers[iMeta])) : 0,
      metaPos:   iMetaPos >= 0 ? num(get(row, headers[iMetaPos])) : 0,
      positMes:  iPositMes >= 0 ? num(get(row, headers[iPositMes])) : 0,
      diasVenda: iDv >= 0 ? get(row, headers[iDv]) : '',
      carteira:  iCa >= 0 ? get(row, headers[iCa]) : '',
      contato:   iCo >= 0 ? get(row, headers[iCo]) : '',
      motivo:    [motivoNV, motivoMot].filter(v => v && v.trim()).join(' | '),
      _via:      'apps-script',
      _iDv:      iDv,
      _iCo:      iCo,
      _rawCols:  headers.map(h => row[h] || ''),
    });
  }
  return result;
}

// ── CSV PARSER ───────────────────────────────────────────
function parseCSV(txt, vendor) {
  if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1);
  const lines = txt.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];

  const firstLine = lines[0];
  const tryDelim = (d) => {
    const res = []; let cur = ''; let q = false;
    for (let i = 0; i < firstLine.length; i++) {
      const ch = firstLine[i];
      if (ch === '"') { if (q && firstLine[i+1]==='"') { cur+='"'; i++; } else q=!q; }
      else if (ch === d && !q) { res.push(cur); cur=''; }
      else cur += ch;
    }
    res.push(cur);
    return res.length;
  };
  const delim = tryDelim(';') > tryDelim(',') ? ';' : ',';

  const splitLine = (line) => {
    const res = []; let cur = ''; let q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (q && line[i+1]==='"') { cur+='"'; i++; } else q=!q; }
      else if (ch === delim && !q) { res.push(cur); cur=''; }
      else cur += ch;
    }
    res.push(cur);
    return res;
  };

  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  DATA['__cols__' + vendor] = headers;

  const fi = (name) => {
    const n = name.toLowerCase();
    let i = headers.findIndex(h => h.toLowerCase() === n);
    if (i < 0) i = headers.findIndex(h => h.toLowerCase().includes(n.slice(0,6)));
    return i;
  };

  const iCl=fi(C.cl), iCn=fi(C.cn||'CLIENTE'), iDt=fi(C.dt), iVl=fi(C.vl), iCa=fi(C.ca),
        iCo=fi(C.co), iMo=fi(C.mo), iMo2=fi('MOTIVO'),
        iMeta=fi(C.meta), iMetaPos=fi(C.metaPos||'META POSIT.'), iPositMes=fi(C.positMes||'POSIT. MÊS'), iDv=fi(C.dv);

  const get  = (c, i) => i >= 0 ? (c[i]||'').replace(/^"|"$/g,'').trim() : '';
  const num  = (s) => parseFloat((s||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    const clientRaw = get(c, iCl);
    const dateStr   = get(c, iDt);
    if (!clientRaw && !dateStr) continue;
    rows.push({
      vendor,
      client:     clientRaw.replace(/\.0+$/, ''),
      clientName: get(c, iCn),
      dateRaw:    dateStr,
      date:       pDate(dateStr),
      value:      num(get(c, iVl)),
      meta:       num(get(c, iMeta)),
      metaPos:    num(get(c, iMetaPos)),
      positMes:   num(get(c, iPositMes)),
      diasVenda:  get(c, iDv),
      carteira:   get(c, iCa),
      contato:    get(c, iCo),
      motivo:     [get(c,iMo), get(c,iMo2)].filter(v => v && v.trim()).join(' | '),
      _via:       'csv',
      _rawCols:   c,
      _iDv:       iDv,
      _iCo:       iCo,
    });
  }
  return rows;
}

// ── pDate ──────────────────────────────────────────────
function pDate(s){
  if(!s) return null;
  s = String(s).trim();
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(m){
    const y   = m[3].length===2 ? '20'+m[3] : m[3];
    const hh  = m[4] ? m[4].padStart(2,'0') : '00';
    const mm  = m[5] ? m[5].padStart(2,'0') : '00';
    return new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T${hh}:${mm}:00`);
  }
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return new Date(`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

async function loadData(){
  const btn = document.getElementById('btn-ref');
  btn.classList.add('ld');

  showProgress();
  DATA = {};

  const allCandidates = C.sh;

  const exportData = await loadAllFromAppsScript();

  if (exportData) {
    allCandidates.forEach(name => {
      const vendorRows = exportData[name];
      if (vendorRows && vendorRows.length > 0) {
        const headers = Object.keys(vendorRows[0]);
        DATA['__cols__' + name] = headers;
        DATA[name] = parseAppsScript({ headers, rows: vendorRows }, name);
        console.log(`✅ ${name} — ${DATA[name].length} clientes | meta=${DATA[name][0]?.meta} metaPos=${DATA[name][0]?.metaPos}`);
      } else {
        DATA[name] = [];
      }
    });
  } else {
    console.warn('⚠️ Export falhou — todos os vendedores sem dados');
    allCandidates.forEach(name => { DATA[name] = []; });
  }

  // Remove abas com fallback (mesmo nº de clientes = provavelmente aba errada)
  const shOriginal = ['ADRIANO','ALEX','AUGUSTO','BRUNO','DEBORAH','DENIS','DOUGLAS','JOYCE','LEANDRO','LUCAS','MARCELO','MATEUS','NOA','RAFAEL','ROSANE','THAIS','WESLEY','ALINE','CINTIA','KEULLY'];
  const countMap = {};
  allCandidates.forEach(v => {
    const n = (DATA[v]||[]).length;
    if (n > 0) { if (!countMap[n]) countMap[n] = []; countMap[n].push(v); }
  });
  Object.values(countMap).forEach(vendors => {
    if (vendors.length > 1) {
      const fake = vendors.filter(v => !shOriginal.includes(v));
      fake.forEach(v => { DATA[v] = []; console.warn(`"${v}" zerado (fallback)`); });
    }
  });

  const activeSheets = allCandidates.filter(v => (DATA[v]||[]).length > 0);
  C.sh = activeSheets.length > 0 ? activeSheets : shOriginal;
  console.log('✅ Abas ativas:', C.sh.join(', '));

  hideProgress();
  btn.classList.remove('ld');
  document.getElementById('upd').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');

  const totalRows = C.sh.reduce((a,v) => a + (DATA[v]||[]).length, 0);
  if (totalRows === 0) {
    showErr('⚠️ Nenhum dado carregado. Verifique o Apps Script e o compartilhamento da planilha.');
  } else {
    hideToast(); // Fecha toast de erro se carregou com sucesso
    console.log(`%c🎉 Total: ${totalRows} registros carregados`, 'color:#1a8c4e;font-weight:bold;font-size:14px');
  }

  document.getElementById('dbar').style.display = 'flex';
  buildTabs(); render();
}

function parseDays(str) {
  if (!str || str === '0') return [];
  return String(str).split(/[-;,]/).map(d => parseInt(d.trim())).filter(d => !isNaN(d) && d > 0);
}
function getMaxDay(rows) {
  const maxDate = rows.reduce((max, r) => {
    const d = r.date ? r.date.toISOString().slice(0,10) : '';
    return d > max ? d : max;
  }, '');
  if (!maxDate) return null;
  const recentRows = rows.filter(r => r.date && r.date.toISOString().slice(0,10) === maxDate);
  let maxDay = 0;
  recentRows.forEach(r => {
    const dvDays = parseDays(r.diasVenda);
    const coDays = parseDays(r.contato);
    [...dvDays, ...coDays].forEach(d => { if (d > maxDay) maxDay = d; });
  });
  return maxDay > 0 ? { maxDate, maxDay } : null;
}
function fltPeriodByDate(rows){
  if(PERIOD==='all') return rows;
  if(PERIOD==='custom'){
    return rows.filter(r=>{
      if(!r.date) return false;
      if(D_FROM && r.date<D_FROM) return false;
      if(D_TO   && r.date>D_TO)   return false;
      return true;
    });
  }
  if(PERIOD==='mtd'){
    const now = new Date();
    const ini = new Date(now.getFullYear(), now.getMonth(), 1);
    return rows.filter(r => r.date && r.date >= ini);
  }
  const maxDate = rows.reduce((max, r) => {
    const d = r.date ? r.date.toISOString().slice(0,10) : '';
    return d > max ? d : max;
  }, '');
  if(PERIOD==='1'){
    return rows.filter(r => r.date && r.date.toISOString().slice(0,10) === maxDate);
  }
  const cut = new Date(Date.now() - parseInt(PERIOD)*864e5);
  return rows.filter(r => r.date && r.date >= cut);
}
function fltPeriod(rows){
  if(PERIOD==='all') return rows;
  if(PERIOD==='custom'){
    return rows.filter(r=>{
      if(!r.date) return false;
      if(D_FROM && r.date<D_FROM) return false;
      if(D_TO   && r.date>D_TO)   return false;
      return true;
    });
  }
  if(PERIOD==='mtd'){
    const now = new Date();
    const ini = new Date(now.getFullYear(), now.getMonth(), 1);
    return rows.filter(r => r.date && r.date >= ini);
  }
  if(PERIOD==='1'){
    const info = getMaxDay(rows);
    if (!info) return rows;
    const prevDay = info.maxDay - 1;
    if (prevDay <= 0) return [];
    return rows.filter(r => {
      if (!r.date || r.date.toISOString().slice(0,10) !== info.maxDate) return false;
      const dvDays = parseDays(r.diasVenda);
      const coDays = parseDays(r.contato);
      return dvDays.includes(prevDay) || coDays.includes(prevDay);
    });
  }
  if(!isNaN(parseInt(PERIOD))){
    const info = getMaxDay(rows);
    if (!info) return rows;
    const cutDay = info.maxDay - parseInt(PERIOD) + 1;
    return rows.filter(r => {
      if (!r.date || r.date.toISOString().slice(0,10) !== info.maxDate) return false;
      const dvDays = parseDays(r.diasVenda);
      const coDays = parseDays(r.contato);
      return [...dvDays, ...coDays].some(d => d >= cutDay && d <= info.maxDay);
    });
  }
  return rows;
}

// ── TABS ──────────────────────────────────────────────
function buildTabs(){
  const w = document.getElementById('tabs'); w.innerHTML = '';
  const groupVendors = getGroupVendors().filter(v => (DATA[v]||[]).length > 0);
  const sorted = [...groupVendors].sort((a,b) => a.localeCompare(b));
  sorted.forEach(s => {
    const el = document.createElement('div');
    el.className = 'vtab' + (s === ACTIVE ? ' active' : '');
    el.textContent = s;
    el.onclick = () => {
      ACTIVE = s;
      document.querySelectorAll('.vtab').forEach(v => v.classList.remove('active'));
      el.classList.add('active');
      render();
    };
    w.appendChild(el);
  });
}

// ── STATUS ───────────────────────────────────────────
function status(r){
  if(r.value>0)                                          return 'positivado';
  if(r.motivo&&r.motivo.trim())                          return 'nao_venda';
  if(r.contato&&r.contato.trim())                        return 'em_contato';
  if(r.carteira&&r.carteira.toLowerCase().trim()==='sim')return 'em_carteira';
  return null;
}

function dedup(rows){
  const m=new Map();
  for(const r of rows){
    const k=`${r.vendor}::${(r.client||'').toLowerCase()}`;
    const ex=m.get(k);
    if(!ex){m.set(k,r);continue;}
    const a=ex.date?ex.date.getTime():0;
    const b=r.date?r.date.getTime():0;
    if(b>a)m.set(k,r);
  }
  return Array.from(m.values());
}

// ── RENDER ────────────────────────────────────────────
function render(){
  const getRaw = (vendor) => (DATA[vendor] || []).map(r => ({...r, vendor}));
  const allRaw = ACTIVE==='all'
    ? getGroupVendors().flatMap(v => getRaw(v))
    : getRaw(ACTIVE);

  const dd   = dedup(allRaw);
  const rows = fltPeriod(dd);

  const dedupGlobalFn = (arr) => {
    const m = new Map();
    for (const r of arr) {
      const k = (r.client||'').toLowerCase().trim();
      if (!k) continue;
      const ex = m.get(k);
      if (!ex) { m.set(k, r); continue; }
      const a = ex.date ? ex.date.getTime() : 0;
      const b =  r.date ?  r.date.getTime() : 0;
      if (b > a) m.set(k, r);
    }
    return Array.from(m.values());
  };
  const rowsFinanceiro = dedupGlobalFn(rows);

  const totVal  = rowsFinanceiro.filter(r => r.value > 0).reduce((a,r) => a + (r.value || 0), 0);

  const cntPos  = rows.filter(r => r.value > 0).length;
  const rowsByDate = fltPeriodByDate(dd);
  const cntNav  = rowsByDate.filter(r => r.motivo && r.motivo.trim()).length;
  const cntCon  = rows.filter(r => r.contato && r.contato.trim()).length;
  const cntCar  = dd.filter(r => r.carteira && r.carteira.toLowerCase().trim() === 'sim').length;
  const cntVen  = rows.filter(r => { const dv = String(r.diasVenda||'').trim(); return dv && dv !== '0'; }).length;

  const total = rows.length;

  // ── Evolução diária
  const evoRaw = fltPeriod(allRaw);
  const byD = {};
  const refDate = evoRaw.reduce((max, r) => r.date && r.date > max ? r.date : max, new Date(0));
  const refYear  = refDate.getFullYear();
  const refMonth = refDate.getMonth();
  const getDayKey = (day) => {
    const d = new Date(refYear, refMonth, parseInt(day));
    return isNaN(d.getTime()) ? null : d.toISOString().slice(0,10);
  };
  evoRaw.forEach(r => {
    const clientKey = (r.vendor||'') + '::' + r.client;
    const coStr = String(r.contato || '').trim();
    if (coStr && coStr !== '0') {
      coStr.split(/[-;,]/).map(d => d.trim()).filter(Boolean).forEach(day => {
        const k = getDayKey(day);
        if (!k) return;
        if (!byD[k]) byD[k] = { contato: new Set(), positivado: new Set() };
        byD[k].contato.add(clientKey);
      });
    }
    const dvStr = String(r.diasVenda || '').trim();
    if (dvStr && dvStr !== '0') {
      dvStr.split(/[-;,]/).map(d => d.trim()).filter(Boolean).forEach(day => {
        const k = getDayKey(day);
        if (!k) return;
        if (!byD[k]) byD[k] = { contato: new Set(), positivado: new Set() };
        byD[k].positivado.add(clientKey);
      });
    }
  });
  Object.values(byD).forEach(d => { d.contato = d.contato.size; d.positivado = d.positivado.size; });
  const dKeys = Object.keys(byD).sort();

  // ── Vendor stats
  const vs = {};
  getGroupVendors().forEach(v => {
    const vd    = fltPeriod(dedup(getRaw(v)));
    const vdFin = dedupGlobalFn(vd);
    vs[v] = {
      total:       vd.length,
      value:       vdFin.filter(r => r.value > 0).reduce((a,r) => a + (r.value||0), 0),
      meta:        vdFin.reduce((a,r) => a + (r.meta||0), 0),
      positivado:  vd.filter(r => r.value > 0).length,
      nao_venda:   vd.filter(r => r.motivo  && r.motivo.trim()).length,
      em_contato:  vd.filter(r => r.contato && r.contato.trim()).length,

    };
  });

  const mc=document.getElementById('mc');
  mc.innerHTML='';mc.className='fin';

  // ── MTD sempre acumulado do mês
  const ddAll = dedup(allRaw);
  const rowsMtd = ddAll.filter(r => {
    if (!r.date) return false;
    const now = new Date();
    return r.date >= new Date(now.getFullYear(), now.getMonth(), 1);
  });
  const rowsFinanceiroMtd = dedupGlobalFn(rowsMtd);
  const totValMtd  = rowsFinanceiroMtd.filter(r => r.value > 0).reduce((a,r) => a + (r.value||0), 0);
  const maxMetaFat = rowsFinanceiroMtd.reduce((a,r) => a + (r.meta||0), 0);
  const ating      = maxMetaFat > 0 ? Math.round((totValMtd / maxMetaFat) * 100) : null;

  const vendorsAtivos = getGroupVendors().filter(v => (DATA[v]||[]).length > 0);
  let totalMetaPos = 0;
  let totalPositMes = 0;
  vendorsAtivos.forEach(v => {
    const vRowsMtd = fltPeriodByDate(dedup(getRaw(v))).filter(r => {
      if (!r.date) return false;
      const now = new Date();
      return r.date >= new Date(now.getFullYear(), now.getMonth(), 1);
    });
    totalMetaPos  += vRowsMtd.reduce((max,r) => Math.max(max, r.metaPos||0), 0);
    totalPositMes += vRowsMtd.reduce((a,r) => a + (r.positMes||0), 0);
  });
  const pctPos = totalMetaPos > 0 ? Math.round((totalPositMes / totalMetaPos) * 100) : null;

  const kpisRow1 = [
    {ico:'💼', lbl:'Carteira',   sub:'Grupos Comerciais', val:cntCar, kc:'var(--g-car)'},
    {ico:'📞', lbl:'Contato',    sub:'Grupos Comerciais', val:cntCon, kc:'var(--blue)'},
    {ico:'🛒', lbl:'Venda',      sub:'Grupos Comerciais', val:cntVen, kc:'var(--g-pos)'},
    {ico:'❌', lbl:'Não Venda',  sub:'Grupos Comerciais', val:cntNav, kc:'var(--red)'},
  ];
  const kpisRow2 = [
    {ico:'💰', lbl:'Faturamento MTD', val:fBRL(totValMtd), kc:'var(--blue2)', lg:true, ating},
    {ico:'✅', lbl:'Positivado MTD',  val:totalPositMes||cntPos, kc:'var(--g-pos)', lg:true, ating:pctPos},
  ];

  const kpiHtml = (k) => `
    <div class="kpi" style="--kc:${k.kc}">
      <div class="kpi-bar"></div>
      <div class="kpi-ico">${k.ico}</div>
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val${k.lg?' lg':k.sm?' sm':''}">${k.val}</div>
      ${k.sub ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">${k.sub}</div>` : ''}
      ${k.ating!=null ? `
        <div style="margin-top:8px">
          <div style="height:5px;background:var(--gray);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${Math.min(k.ating,100)}%;background:${k.ating>=100?'#1a8c4e':k.ating>=70?'#b87a00':'var(--red)'};border-radius:4px;transition:width .8s"></div>
          </div>
          <div style="font-size:13px;font-weight:700;color:var(--text3);margin-top:4px;font-family:'Roboto Mono',monospace">${k.ating}% da meta</div>
        </div>` : ''}
    </div>`;

  const mtdBar = document.getElementById('mtd-bar');
  const mtdCards = document.getElementById('mtd-cards');
  if (mtdBar && mtdCards) {
    mtdBar.style.display = 'block';
    mtdCards.innerHTML = kpisRow2.map(kpiHtml).join('');
  }

  mc.innerHTML += `
    <div class="kpi-g" style="grid-template-columns:repeat(4,1fr);margin-bottom:22px">
      ${kpisRow1.map(kpiHtml).join('')}
    </div>`;

  mc.innerHTML+=`
  <div style="display:grid;grid-template-columns:1fr 260px 260px;gap:18px;margin-bottom:22px">
    <div class="ch-card">
      <div class="stitle" style="--al:var(--blue)">Evolução Diária — Contatos e Positivados</div>
      <div class="ch-wrap" style="height:280px"><canvas id="cevo"></canvas></div>
    </div>
    <div class="ch-card" style="display:flex;flex-direction:column">
      <div class="stitle" style="--al:var(--red)">Funil de Vendas</div>
      <div id="funil-wrap" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:10px"></div>
    </div>
    <div class="ch-card" style="display:flex;flex-direction:column">
      <div class="stitle" style="--al:#cc1a1a">Motivos Não Venda</div>
      <div id="motivos-wrap" style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px;padding-top:8px"></div>
    </div>
  </div>`;

  if(ACTIVE==='all'){
    const MINI_ORDER = [
      { key:'em_carteira', lbl:'Carteira',   col:'#b87a00' },
      { key:'em_contato',  lbl:'Contato',    col:'#1a3a8c' },
      { key:'positivado',  lbl:'Positivado', col:'#1a8c4e' },
      { key:'nao_venda',   lbl:'Não Venda',  col:'#cc1a1a' },
    ];
    const sortedV = [...C.sh].sort((a,b)=>a.localeCompare(b));
    mc.innerHTML+=`<div class="stitle" style="--al:#a855f7;margin-bottom:14px">Performance por Vendedor</div>
    <div class="vnd-g">${sortedV.map(v=>{
      const s=vs[v]||{},ini=v.slice(0,2).toUpperCase();
      const vAting = s.meta>0 ? Math.round((s.value/s.meta)*100) : null;
      const vAtingStr = vAting!=null
        ? `<span style="font-weight:700;color:${vAting>=100?'#1a8c4e':vAting>=70?'#b87a00':'#cc1a1a'}">${vAting}%</span> meta`
        : 'sem meta';
      return `<div class="vnd" onclick="swV('${v}')">
        <div class="vnd-h">
          <div class="vnd-av">${ini}</div>
          <div>
            <div class="vnd-nm">${v}</div>
            <div class="vnd-sb">${fBRL(s.value||0)} · ${vAtingStr}</div>

        </div>
        <div class="mini">${MINI_ORDER.map(st=>`<div class="mini-s">
          <div class="mini-v" style="color:${st.col}">${s[st.key]||0}</div>
          <div class="mini-l">${st.lbl}</div>
        </div>`).join('')}</div>
      </div>`;}).join('')}</div>`;
  }

  const dedupGlobal = (rows) => {
    const m = new Map();
    for (const r of rows) {
      const k = (r.client || '').toLowerCase().trim();
      if (!k) continue;
      const ex = m.get(k);
      if (!ex) { m.set(k, r); continue; }
      const a = ex.date ? ex.date.getTime() : 0;
      const b =  r.date ?  r.date.getTime() : 0;
      if (b > a) m.set(k, r);

    return Array.from(m.values());

  const rawForTable = dedupGlobal(allRaw)
    .sort((a,b) => (b.value || 0) - (a.value || 0));

  mc.innerHTML+=`
  <div class="tbl-card">
    <div class="tbl-hd">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex:1">
        <div class="tbl-ti">📋 Detalhamento de Clientes</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <div class="stg-chip active" data-stg="all"    onclick="setStgFilter('all',this)">Todos</div>
          <div class="stg-chip" data-stg="positivado"    onclick="setStgFilter('positivado',this)"   style="--cc:#1a8c4e">✅ Positivado</div>
          <div class="stg-chip" data-stg="em_carteira"   onclick="setStgFilter('em_carteira',this)"  style="--cc:#b87a00">💼 Carteira</div>
          <div class="stg-chip" data-stg="em_contato"    onclick="setStgFilter('em_contato',this)"   style="--cc:#1a3a8c">📞 Contato</div>

}

  const dataContat = dKeys.map(d => byD[d].contato    || 0);
  const dataPosit  = dKeys.map(d => byD[d].positivado || 0);
  CH = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Contatos',   data:dataContat, borderColor:'#1a3a8c', backgroundColor:'rgba(26,58,140,.10)', borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#1a3a8c', pointHoverRadius:6, tension:0.4, fill:false },
        { label:'Positivados',data:dataPosit,  borderColor:'#1a8c4e', backgroundColor:'rgba(26,140,78,.10)',  borderWidth:2.5, pointRadius:4, pointBackgroundColor:'#1a8c4e', pointHoverRadius:6, tension:0.4, fill:false }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{color:'#4a5878',font:{family:'Montserrat',size:12,weight:'600'},boxWidth:14,padding:20}},
        tooltip:{backgroundColor:'#0f1f4a',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,.8)',titleFont:{family:'Montserrat',size:12,weight:'700'},bodyFont:{family:'Roboto Mono',size:11},padding:12}
      },
      scales:{
        y:{beginAtZero:true,grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#8a97b8',font:{family:'Roboto Mono',size:10},stepSize:1}},
        x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#8a97b8',font:{family:'Roboto Mono',size:10},maxTicksLimit:16,maxRotation:45}}
      }
    }
  });
}

// ── FUNIL VISUAL ──────────────────────────────────────
function buildFunil(cntCar, cntCon, cntVen, cntNav, total){
  const el = document.getElementById('funil-wrap'); if (!el) return;
  const stages = [
    { lbl:'Carteira',  val:cntCar, col:'#b87a00', ico:'💼' },
    { lbl:'Contato',   val:cntCon, col:'#1a3a8c', ico:'📞' },
    { lbl:'Venda',     val:cntVen, col:'#1a8c4e', ico:'🛒' },
    { lbl:'Não Venda', val:cntNav, col:'#cc1a1a', ico:'❌' },
  ];
  const max = Math.max(...stages.map(s=>s.val), 1);
  el.innerHTML = stages.map((s, i) => {
    const pct  = total > 0 ? ((s.val / total) * 100).toFixed(0) : 0;
    const barW = ((s.val / max) * 100).toFixed(0);
    const marginPx = i * 10;
    return `<div style="margin:0 ${marginPx}px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:13px">${s.ico}</span>
          <span style="font-size:11px;font-weight:700;color:${s.col};text-transform:uppercase;letter-spacing:.5px">${s.lbl}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'Roboto Mono',monospace;font-size:18px;font-weight:700;color:var(--text)">${s.val}</span>
          <span style="font-family:'Roboto Mono',monospace;font-size:10px;color:var(--text3)">${pct}%</span>
        </div>
      </div>
      <div style="height:8px;background:var(--gray);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${s.col};border-radius:6px;transition:width .8s cubic-bezier(.23,1,.32,1)"></div>
      </div>
    </div>`;
  }).join('');
}

// ── MOTIVOS NÃO VENDA ─────────────────────────────────
function buildMotivos(rows) {
  const el = document.getElementById('motivos-wrap'); if (!el) return;
  const counts = {};
  rows.forEach(r => {
    const m = (r.motivo || '').trim();
    if (!m) return;
    m.split('|').forEach(part => {
      const p = part.trim();
      if (p && !['SIM','NÃO','NAO','S','N'].includes(p.toUpperCase())) counts[p] = (counts[p] || 0) + 1;
    });
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,8);
  if (!sorted.length) { el.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center">Nenhum motivo registrado</div>`; return; }
  const max = sorted[0][1];
  const colors = ['#cc1a1a','#e05c1a','#d4860a','#b87a00','#8a6500','#6b4f00','#4a3800','#2e2400'];
  el.innerHTML = sorted.map(([motivo, cnt], i) => {
    const pct  = ((cnt / rows.filter(r=>r.motivo&&r.motivo.trim()).length) * 100).toFixed(0);
    const barW = ((cnt / max) * 100).toFixed(0);
    const col  = colors[i] || '#888';
    return `<div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px" title="${motivo}">${motivo}</span>
        <span style="font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;color:${col};margin-left:6px">${cnt} <span style="color:var(--text3);font-weight:400">(${pct}%)</span></span>
      </div>
      <div style="height:6px;background:var(--gray);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${col};border-radius:4px;transition:width .8s cubic-bezier(.23,1,.32,1)"></div>
      </div>
    </div>`;
  }).join('');
}

// ── TABLE ─────────────────────────────────────────────
function drawTbl(rows, noUpdate){
  if(!noUpdate) { _rows = rows; _activeStg = 'all'; }
  const tb = document.getElementById('tb'); if(!tb) return;
  const showV = ACTIVE==='all';
  const sm = {positivado:STAGES[0], nao_venda:STAGES[1], em_contato:STAGES[2], em_carteira:STAGES[3]};
  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--text3)">Nenhum dado encontrado</td></tr>`;
    return;
  }
  tb.innerHTML = rows.slice(0,300).map(r => {
    const sk  = status(r);
    const st  = sk ? sm[sk] : null;
    const bdg = st ? `<span class="badge" style="background:${st.bg};color:${st.col}">${st.lbl}</span>` : `<span class="badge" style="background:#f0f0f0;color:#aaa">—</span>`;
    const car = (r.carteira||'').toLowerCase().trim();
    return `<tr>
      <td>${r.clientName ? `<div style="font-weight:600">${r.clientName}</div><div style="font-size:10px;color:var(--text3)">${r.client||''}</div>` : (r.client||'—')}</td>
      ${showV?`<td style="font-weight:700;color:var(--blue)">${r.vendor}</td>`:''}
      <td>${bdg}</td>
      <td style="font-family:'Roboto Mono',monospace;color:${r.value>0?'#1a8c4e':'var(--text2)'};font-weight:${r.value>0?700:400}">${r.value>0?fBRL(r.value):'—'}</td>
      <td style="font-family:'Roboto Mono',monospace;color:var(--text3)">${r.dateRaw||'—'}</td>
      <td>${car==='sim' ? `<span class="badge" style="background:#fff3cd;color:#b87a00">SIM</span>` : `<span style="color:var(--text3)">—</span>`}</td>
      <td style="font-family:'Roboto Mono',monospace">${r.contato||'—'}</td>
      <td style="font-family:'Roboto Mono',monospace;color:#1a8c4e">${r.diasVenda||'—'}</td>
      <td style="color:var(--red);font-weight:${r.motivo?600:400}">${r.motivo||'—'}</td>
    </tr>`;
  }).join('');
  if(rows.length>300) tb.innerHTML+=`<tr><td colspan="9" style="text-align:center;padding:14px;color:var(--text3);font-size:12px">Exibindo 300 de ${rows.length} registros</td></tr>`;
}
function fltTbl(q){ applyTblFilters(q, _activeStg); }
let _activeStg = 'all';
function setStgFilter(stg, el){
  _activeStg = stg;
  document.querySelectorAll('.stg-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyTblFilters(document.getElementById('tq')?.value || '', stg);
}
function applyTblFilters(q, stg){
  let filtered = _rows;
  if(stg && stg !== 'all') filtered = filtered.filter(r => status(r) === stg);
  if(q && q.trim()){ const lq = q.toLowerCase(); filtered = filtered.filter(r => (r.client||'').toLowerCase().includes(lq)||(r.vendor||'').toLowerCase().includes(lq)||(r.motivo||'').toLowerCase().includes(lq)); }
  drawTbl(filtered, true);
}

// ── HELPERS ──────────────────────────────────────────
function searchClient(){
  const q = (document.getElementById('dbg-client-search').value||'').trim().toLowerCase();
  const res = document.getElementById('dbg-client-result');
  if (!q) { res.innerHTML='<span style="color:#888">Digite um código</span>'; return; }
  const activeVendors = ACTIVE==='all' ? C.sh.filter(v=>(DATA[v]||[]).length>0) : [ACTIVE];
  const allRows = activeVendors.flatMap(v => (DATA[v]||[]).map(r=>({...r,vendor:v})));
  const found = allRows.filter(r => (r.client||'').toLowerCase().includes(q));
  if (!found.length) { res.innerHTML = `<span style="color:#ff6b6b">Nenhum registro encontrado para "${q}"</span>`; return; }
  res.innerHTML = `<div style="color:#ffb800;font-weight:700;margin-bottom:8px">${found.length} registro(s) para "${q}":</div>` +
    found.map((r,i) => {
      const dvRaw  = r.diasVenda || '—';
      const coRaw  = r.contato   || '—';
      const headers = DATA['__cols__'+r.vendor] || [];
      const dvKey  = r._iDv >= 0 ? (headers[r._iDv]||'?') : '?';
      const coKey  = r._iCo >= 0 ? (headers[r._iCo]||'?') : '?';
      const dvRawCol = r._rawCols && r._iDv >= 0 ? (r._rawCols[r._iDv]||'(vazio)') : '(sem raw)';
      const coRawCol = r._rawCols && r._iCo >= 0 ? (r._rawCols[r._iCo]||'(vazio)') : '(sem raw)';
      return `<div style="margin-bottom:10px;padding:10px;background:rgba(255,255,255,.04);border-radius:6px;border-left:3px solid ${r.value>0?'#00e5a0':'#444'}">
        <b style="color:#fff">${r.client}</b> — <span style="color:#3a6fd8">${r.vendor}</span> — ${r.dateRaw}
        — <span style="color:${r._via==='apps-script'?'#00e5a0':'#ffb800'};font-weight:700">via: ${r._via||'?'}</span><br><br>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px">
          <div style="background:rgba(0,229,160,.05);padding:8px;border-radius:4px;border:1px solid rgba(0,229,160,.2)">
            <div style="color:#00e5a0;font-weight:700;margin-bottom:4px">DIAS VENDA</div>
            <div>Config: <b style="color:#fff">"${C.dv}"</b></div>
            <div>Idx: <b style="color:${r._iDv>=0?'#00e5a0':'#ff6b6b'}">${r._iDv} — "${dvKey}"</b></div>
            <div>Raw: <b style="color:#ffb800">"${dvRawCol}"</b></div>
            <div>Após parse: <b style="color:${dvRaw!=='—'?'#00e5a0':'#ff6b6b'}">"${dvRaw}"</b></div>
          </div>
          <div style="background:rgba(58,111,216,.05);padding:8px;border-radius:4px;border:1px solid rgba(58,111,216,.2)">
            <div style="color:#3a6fd8;font-weight:700;margin-bottom:4px">DIAS CONTATO</div>
            <div>Config: <b style="color:#fff">"${C.co}"</b></div>
            <div>Idx: <b style="color:${r._iCo>=0?'#00e5a0':'#ff6b6b'}">${r._iCo} — "${coKey}"</b></div>
            <div>Raw: <b style="color:#ffb800">"${coRawCol}"</b></div>
            <div>Após parse: <b style="color:${coRaw!=='—'?'#00e5a0':'#ff6b6b'}">"${coRaw}"</b></div>
          </div>
        </div>
      </div>`;
    }).join('');
}
function swV(v){ACTIVE=v;document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('active',t.textContent===v));render();}
function setGroup(g){
  GROUP = GROUP === g ? 'all' : g;
  ACTIVE = 'all';
  const isF = GROUP === 'farmer', isD = GROUP === 'developer', isA = GROUP === 'all';
  document.getElementById('btn-farmer').classList.toggle('active', isF);
  document.getElementById('btn-developer').classList.toggle('active', isD);
  document.getElementById('tab-all').classList.toggle('active', isA);
  buildTabs(); render();
}
function fBRL(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}).format(v);}
function setLoad(){document.getElementById('mc').innerHTML=`<div class="st-box"><div class="spin"></div><p>Carregando dados…</p></div>`;}
function showErr(m){const e=document.getElementById('err');e.innerHTML=m+'<br><small style="font-weight:400;opacity:.8">Verifique: Apps Script implantado como "App da Web" com acesso "Qualquer pessoa"</small>';e.classList.add('on');}
function hideErr(){document.getElementById('err').classList.remove('on');}

// ── DEBUG ─────────────────────────────────────────────
function showDebug(){
  const el = document.getElementById('dbg-content');
  let html = '';
  const getRawD = (v) => (DATA[v]||[]).map(r=>({...r,vendor:v}));
  const activeVendors = ACTIVE==='all' ? C.sh.filter(v=>(DATA[v]||[]).length>0) : [ACTIVE];
  const allRawD = activeVendors.flatMap(v => getRawD(v));

  // Busca por cliente
  html += `<div style="margin-bottom:24px;padding:14px;background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.3);border-radius:8px">
    <div style="color:#ffb800;font-weight:800;margin-bottom:10px;font-size:13px">🔍 BUSCA POR CLIENTE ESPECÍFICO</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input id="dbg-client-search" placeholder="Digite o código do cliente" 
        style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:8px 12px;color:#fff;font-family:'Roboto Mono',monospace;font-size:12px;outline:none">
      <button onclick="searchClient()" style="background:#ffb800;color:#000;border:none;border-radius:6px;padding:8px 18px;font-weight:800;cursor:pointer;font-size:12px">Buscar</button>
    </div>
    <div id="dbg-client-result" style="font-size:11px;font-family:'Roboto Mono',monospace"></div>
  </div>`;

  // Status de conexão
  html += `<div style="margin-bottom:20px;padding:14px;background:rgba(58,111,216,.08);border:1px solid rgba(58,111,216,.3);border-radius:8px">
    <div style="color:#3a6fd8;font-weight:800;margin-bottom:10px;font-size:13px">🔗 STATUS DE CONEXÃO</div>
    <div style="font-size:11px;font-family:'Roboto Mono',monospace;line-height:1.8">
      <div>Apps Script URL: <b style="color:#fff;word-break:break-all">${APPS_SCRIPT_URL}</b></div>
      <div>Vendedores carregados: <b style="color:${activeVendors.length>0?'#00e5a0':'#ff6b6b'}">${activeVendors.length}</b></div>
      <div>Total de registros: <b style="color:#fff">${allRawD.length}</b></div>
      <div style="margin-top:10px">
        <button onclick="testConnection()" style="background:#3a6fd8;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:12px">🧪 Testar Conexão Agora</button>
      </div>
      <div id="dbg-conn-result" style="margin-top:10px"></div>
    </div>
  </div>`;

  // Análise de dados
  const byClient = {};
  allRawD.forEach(r => { const k = (r.client||'').toLowerCase().trim(); if (!k) return; if (!byClient[k]) byClient[k] = []; byClient[k].push(r); });
  const multiRows = Object.entries(byClient).filter(([,rows]) => rows.length > 1).sort(([,a],[,b]) => b.length - a.length).slice(0, 10);

  html += `<div style="padding:10px 12px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:12px;font-size:12px">
    <div>Total clientes únicos: <b style="color:#fff">${Object.keys(byClient).length}</b></div>
    <div>Com 1 linha: <b style="color:#00e5a0">${Object.values(byClient).filter(r=>r.length===1).length}</b></div>
    <div>Com múltiplas linhas: <b style="color:#ffb800">${Object.values(byClient).filter(r=>r.length>1).length}</b></div>
  </div>`;

  el.innerHTML = html;
  document.getElementById('dbg-overlay').style.display = 'block';
}

async function testConnection() {
  const res = document.getElementById('dbg-conn-result');
  res.innerHTML = '<span style="color:#888">Testando...</span>';
  try {
    const url = `${APPS_SCRIPT_URL}?action=ping&t=${Date.now()}`;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch(url, { redirect: 'follow', signal: ctrl.signal });
    clearTimeout(timer);
    const txt = await r.text();
    res.innerHTML = `<div style="color:#00e5a0;font-weight:700">✅ Conectado! HTTP ${r.status}</div><div style="color:#888;margin-top:4px">Resposta: ${txt.slice(0,200)}</div>`;
  } catch(e) {
    res.innerHTML = `<div style="color:#ff6b6b;font-weight:700">❌ Falha: ${e.name} — ${e.message}</div>`;
  }
}
</script>
