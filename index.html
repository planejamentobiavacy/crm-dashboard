<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://script.google.com https://script.googleusercontent.com https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src *;">
<title>CRM · Funil de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --blue:  #1a3a8c;
  --blue2: #2452b8;
  --blue3: #3a6fd8;
  --red:   #cc1a1a;
  --red2:  #e52828;
  --white: #ffffff;
  --off:   #f4f6fb;
  --gray:  #e8ecf5;
  --gray2: #c8d0e0;
  --text:  #0f1f4a;
  --text2: #4a5878;
  --text3: #8a97b8;
  --sh:    0 4px 24px rgba(26,58,140,.10);
  --sh2:   0 8px 40px rgba(26,58,140,.18);
  --r:     14px;
  --g-pos: #1a8c4e;
  --g-nav: #cc1a1a;
  --g-cnt: #1a3a8c;
  --g-car: #b87a00;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--off);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:var(--blue);box-shadow:var(--sh);overflow:hidden;min-height:100px}
.hdr-wave{position:absolute;inset:0;pointer-events:none}
/* Red diagonal accent — bottom-right corner only */
.hdr-wave::before{content:'';position:absolute;top:-30px;right:-60px;width:28%;height:200%;
  background:var(--red);transform:skewX(-12deg);border-radius:0}
/* Darker red sliver behind */
.hdr-wave::after{content:'';position:absolute;top:-30px;right:-90px;width:20%;height:200%;
  background:var(--red2);opacity:.6;transform:skewX(-12deg)}
/* No white swoosh */
.hdr-swoosh{display:none}
.hdr-inner{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:22px 36px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:14px}
.logo-ico{width:50px;height:50px;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.logo-txt .t1{font-size:20px;font-weight:900;letter-spacing:-.5px;color:var(--white)}
.logo-txt .t2{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.7)}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.upd{font-family:'Roboto Mono',monospace;font-size:11px;color:rgba(255,255,255,.6)}
.btn{padding:9px 20px;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;letter-spacing:.3px}
.btn-w{background:var(--white);color:var(--blue)}.btn-w:hover{background:var(--gray)}
.btn-r{background:var(--red2);color:var(--white);border:1.5px solid rgba(255,255,255,.2)}.btn-r:hover{background:var(--red)}
.btn.ld{opacity:.6;pointer-events:none}

/* ── SETTINGS ── */
.sett{display:none;background:var(--white);border-bottom:2px solid var(--gray);padding:22px 36px}
.sett.open{display:block}
.sett-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:14px}
.fl{display:flex;flex-direction:column;gap:5px}
.fl label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.fl input{background:var(--off);border:1.5px solid var(--gray2);border-radius:8px;padding:8px 12px;font-family:'Roboto Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color .2s}
.fl input:focus{border-color:var(--blue2)}

/* ── TABS ── */
.tabs{background:var(--white);border-bottom:2px solid var(--gray);padding:0 36px;display:flex;gap:4px;overflow-x:auto}
.vtab{padding:13px 22px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--text3);white-space:nowrap;transition:all .2s;user-select:none}
.vtab:hover{color:var(--blue2)}.vtab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── DATE BAR ── */
.dbar{background:var(--white);border-bottom:2px solid var(--gray);padding:11px 36px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3)}
.dchip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray2);background:var(--white);color:var(--text2);transition:all .2s}
.dchip:hover{border-color:var(--blue2);color:var(--blue)}.dchip.active{background:var(--blue);border-color:var(--blue);color:var(--white)}
.dinp{background:var(--off);border:1.5px solid var(--gray2);border-radius:8px;padding:5px 11px;font-family:'Roboto Mono',monospace;font-size:12px;color:var(--text);outline:none}
.dinp:focus{border-color:var(--blue2)}

/* ── MAIN ── */
main{padding:26px 36px;max-width:1600px;margin:0 auto}

/* ── KPI ── */
.kpi-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--white);border-radius:var(--r);padding:20px 18px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:4px;background:var(--kc,var(--blue));border-radius:var(--r) var(--r) 0 0}
.kpi-ico{position:absolute;top:14px;right:14px;font-size:30px;opacity:.1}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:9px}
.kpi-val{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:5px}
.kpi-val.sm{font-size:19px}.kpi-val.lg{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:800}.kpi-sub{font-size:11px;color:var(--text3);font-weight:500}

/* ── SECTION TITLE ── */
.stitle{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle::before{content:'';display:inline-block;width:4px;height:16px;background:var(--al,var(--blue));border-radius:2px}

/* ── STAGE CARDS ── */
.stg-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
@media(max-width:900px){.stg-row{grid-template-columns:repeat(2,1fr)}}
.stg{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border-top:4px solid var(--sc,var(--blue));position:relative;overflow:hidden;transition:transform .2s}
.stg:hover{transform:translateY(-2px)}
.stg-arr{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:30px;opacity:.07}
.stg-nm{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--sc,var(--blue));margin-bottom:8px}
.stg-ct{font-family:'Roboto Mono',monospace;font-size:36px;font-weight:500;color:var(--text);line-height:1;margin-bottom:3px}
.stg-pc{font-size:11px;color:var(--text3);font-weight:600}
.stg-trk{margin-top:10px;height:5px;background:var(--gray);border-radius:4px;overflow:hidden}
.stg-fil{height:100%;border-radius:4px;background:var(--sc,var(--blue));transition:width .8s cubic-bezier(.23,1,.32,1)}

/* ── CHARTS ── */
.ch-row{display:grid;grid-template-columns:1fr 350px;gap:18px;margin-bottom:22px}
@media(max-width:1100px){.ch-row{grid-template-columns:1fr}}
.ch-card{background:var(--white);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.ch-wrap{position:relative;height:265px}

/* ── FUNNEL LIST ── */
.fn-list{display:flex;flex-direction:column;gap:11px}
.fn-row{display:flex;align-items:center;gap:10px}
.fn-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fn-nm{font-size:12px;font-weight:600;color:var(--text2);width:108px;flex-shrink:0}
.fn-trk{flex:1;height:26px;background:var(--gray);border-radius:6px;overflow:hidden}
.fn-fil{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;transition:width .9s cubic-bezier(.23,1,.32,1)}
.fn-fil span{font-family:'Roboto Mono',monospace;font-size:11px;font-weight:500;color:#fff;white-space:nowrap}
.fn-pc{font-family:'Roboto Mono',monospace;font-size:12px;font-weight:500;color:var(--text3);width:40px;text-align:right;flex-shrink:0}

/* ── VENDOR CARDS ── */
.vnd-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;margin-bottom:22px}
.vnd{background:var(--white);border-radius:var(--r);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border-left:4px solid var(--blue)}
.vnd:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-left-color:var(--red)}
.vnd-h{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.vnd-av{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.vnd-nm{font-size:15px;font-weight:800;color:var(--text)}.vnd-sb{font-size:11px;color:var(--text3);font-family:'Roboto Mono',monospace}
.mini{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mini-s{background:var(--off);border-radius:6px;padding:7px 4px;text-align:center}
.mini-v{font-family:'Roboto Mono',monospace;font-size:16px;font-weight:500}
.mini-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-top:2px}

/* ── TABLE ── */
.tbl-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:28px}
.tbl-hd{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;background:linear-gradient(90deg,var(--blue),var(--blue2))}
.tbl-ti{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff}
.tbl-srch{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:7px 14px;color:#fff;font-family:'Roboto Mono',monospace;font-size:12px;outline:none;width:210px}
.tbl-srch::placeholder{color:rgba(255,255,255,.5)}.tbl-srch:focus{border-color:rgba(255,255,255,.7)}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--off);border-bottom:2px solid var(--gray);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray);transition:background .12s}
tbody tr:hover{background:rgba(26,58,140,.03)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:11px 18px;font-size:13px;color:var(--text2);white-space:nowrap}
tbody td:first-child{font-weight:700;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}

/* ── STATES ── */
.st-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;color:var(--text3);gap:14px;text-align:center}
.st-ico{font-size:44px;opacity:.3}.st-box p{font-size:14px;font-weight:600}
.spin{width:36px;height:36px;border:3px solid var(--gray);border-top-color:var(--blue);border-radius:50%;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:#fff3f3;border:1.5px solid #ffc5c5;border-radius:10px;padding:12px 18px;color:var(--red);font-size:13px;font-weight:600;margin-bottom:18px;display:none}
.err.on{display:block}
.fin{animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── STAGE FILTER CHIPS (tabela) ── */
.stg-chip{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--gray2);background:var(--white);color:var(--text2);transition:all .2s;white-space:nowrap}
.stg-chip:hover{border-color:var(--cc,var(--blue2));color:var(--cc,var(--blue))}
.stg-chip.active{background:var(--cc,var(--blue));border-color:var(--cc,var(--blue));color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--gray)}
::-webkit-scrollbar-thumb{background:var(--gray2);border-radius:4px}
@media(max-width:1100px){.ch-row{grid-template-columns:1fr};[style*="grid-template-columns:1fr 300px"]{grid-template-columns:1fr!important}}
@media(max-width:768px){.hdr-inner,main{padding-left:16px;padding-right:16px}.tabs,.dbar{padding-left:16px;padding-right:16px}.kpi-val{font-size:22px}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-wave"></div>
  <div class="hdr-swoosh"></div>
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-ico">📊</div>
      <div class="logo-txt">
        <div class="t1">CRM · Funil de Vendas</div>
        <div class="t2">Consolidado de Vendedores</div>
      </div>
    </div>
    <div class="hdr-r">
      <span class="upd" id="upd">—</span>
      <button class="btn btn-w" id="btn-ref" onclick="loadData()">↻ Atualizar</button>
      <button class="btn btn-r" onclick="toggleSett()">⚙ Configurar</button>
      <button class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.3)" onclick="showDebug()">🔍 Debug</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="sett" id="sett">
  <div class="sett-g">
    <div class="fl"><label>ID da Planilha</label><input id="s-id" value="1kL0VeAavKt8SwadCOxkvS3BxklZeYnr-huwuobaqPAA"></div>
    <div class="fl"><label>Abas dos Vendedores (vírgula) — adicione novos conforme forem criando abas no Sheets</label><input id="s-sh" value="ADRIANO, ALEX, AUGUSTO, BRUNO, DEBORAH, DENIS, DOUGLAS, JOYCE, LEANDRO, LUCAS, MARCELO, MATEUS, NOA, RAFAEL, ROSANE, THAIS, WESLEY, ALINE, CINTIA, KEULLY"></div>
    <div class="fl"><label>Col. Grupo Comercial</label><input id="s-cl" value="GRUPO COMERCIAL"></div>
    <div class="fl"><label>Col. Data Envio</label><input id="s-dt" value="DATA ENVIO"></div>
    <div class="fl"><label>Col. Fat. Mês</label><input id="s-vl" value="FAT. MÊS"></div>
    <div class="fl"><label>Col. Carteira</label><input id="s-ca" value="CARTEIRA"></div>
    <div class="fl"><label>Col. Dias Contato</label><input id="s-co" value="DIAS CONTATO"></div>
    <div class="fl"><label>Col. Não Venda</label><input id="s-mo" value="NÃO VENDA"></div>
  </div>
  <button class="btn" style="background:var(--blue);color:#fff" onclick="saveSett()">💾 Salvar e Recarregar</button>
  <div style="margin-top:20px;border-top:1px solid var(--gray);padding-top:16px">
    <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Vendedores — Última Atualização</div>
    <div id="sett-vendors" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;font-size:12px"></div>
  </div>
</div>

<!-- DEBUG MODAL -->
<div id="dbg-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;overflow:auto;padding:30px">
  <div style="background:#0f1f4a;border-radius:14px;padding:28px;max-width:1100px;margin:0 auto;color:#e8ecf0;font-family:'Roboto Mono',monospace;font-size:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;color:#fff">🔍 Debug — Dados Brutos</div>
      <button onclick="document.getElementById('dbg-overlay').style.display='none'" style="background:rgba(255,255,255,.1);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px">✕ Fechar</button>
    </div>
    <div id="dbg-content"></div>
  </div>
</div>


<div class="tabs" style="display:flex;align-items:center;gap:0">
  <div id="tab-all" class="vtab active" onclick="setGroup('all');document.querySelectorAll('.vtab').forEach(v=>v.classList.remove('active'));this.classList.add('active')">🌐 Todos</div>
  <div id="btn-farmer" class="vtab" onclick="setGroup('farmer')" style="color:#b87a00">🌾 Farmer</div>
  <div id="btn-developer" class="vtab" onclick="setGroup('developer')" style="color:#1a3a8c">💻 Developer</div>
  <div style="width:1px;height:24px;background:rgba(0,0,0,.12);margin:0 4px"></div>
  <div id="tabs" style="display:flex;overflow-x:auto"></div>
</div>

<!-- MTD CARDS BAR -->
<div id="mtd-bar" style="display:none;padding:10px 36px;background:var(--off);border-bottom:1px solid var(--gray)">
  <div id="mtd-cards" style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:600px"></div>
</div>

<!-- DATE BAR -->
<div class="dbar" id="dbar" style="display:none">
  <span class="dlbl">📅 Período:</span>
  <div class="dchip active" onclick="setPeriod('all',this)">Todos</div>
  <div class="dchip" onclick="setPeriod('hoje',this)">Hoje</div>
  <div class="dchip" onclick="setPeriod('1',this)">Últ. Dia</div>
  <div class="dchip" onclick="setPeriod('7',this)">7 dias</div>
  <div class="dchip" onclick="setPeriod('mtd',this)">MTD</div>
  <div class="dchip" onclick="setPeriod('custom',this)">Personalizado</div>
  <input type="date" class="dinp" id="d-from" style="display:none" onchange="applyDates()">
  <span id="d-sep" style="display:none;color:var(--text3);font-size:12px">até</span>
  <input type="date" class="dinp" id="d-to" style="display:none" onchange="applyDates()">
</div>

<!-- MAIN -->
<main>
  <div class="err" id="err"></div>
  <div id="mc">
    <div class="st-box"><div class="spin"></div><p>Carregando dados da planilha…</p></div>
  </div>
</main>

<script>
// ── CONFIG ──────────────────────────────────────────
const C = {
  id:  '1kL0VeAavKt8SwadCOxkvS3BxklZeYnr-huwuobaqPAA',
  sh:  ['ADRIANO','ALEX','AUGUSTO','BRUNO','DEBORAH','DENIS','DOUGLAS','LEANDRO','LUCAS','MATEUS','RAFAEL','ROSANE','THAIS','WESLEY','ALINE','CINTIA','KEULLY'],
  cl:  'GRUPO COMERCIAL',
  cn:  'CLIENTE',           // coluna nome do cliente
  dt:  'DATA ENVIO',
  vl:  'FAT. MÊS',
  ca:  'CARTEIRA',
  co:  'DIAS CONTATO',
  mo:  'NÃO VENDA',
  mo2: 'MOTIVO',
  meta:'META FAT.',       // coluna de meta de faturamento
  metaPos: 'META POSIT.', // coluna de meta de positivação
  positMes: 'POSIT. MÊS', // coluna de positivados acumulados no mês
  dv:  'DIAS VENDA',     // coluna de dias venda (positivados no gráfico)
};

const STAGES = [
  { key:'positivado',  lbl:'Positivado',  col:'#1a8c4e', bg:'#e6f7ee' },
  { key:'nao_venda',   lbl:'Não Venda',   col:'#cc1a1a', bg:'#ffeaea' },
  { key:'em_contato',  lbl:'Contato',     col:'#1a3a8c', bg:'#e8eef9' },
  { key:'em_carteira', lbl:'Carteira',    col:'#b87a00', bg:'#fff8e6' },
];

// ── STATE ────────────────────────────────────────────
let DATA = {}, ACTIVE = 'all', PERIOD = 'all', GROUP = 'all';

// Mapeamento NOME_VENDEDOR (vendas_v1) → nome da aba
const VENDOR_MAP = {
  'CARLOS ADRIANO LEPERES':  'ADRIANO',
  'LEANDRO OLIVEIRA':        'LEANDRO',
  'DENIS APARECIDO':         'DENIS',
  'LUCAS CUSTODIO':          'LUCAS',
  'MARCELO OLIVEIRA':        'MARCELO',
  'DOUGLAS ALMEIDA':         'DOUGLAS',
  'NOADIA MARTINS':          'NOA',
  'DEBORAH MARTINS':         'DEBORAH',
  'JOYCE SILVA DE OLIVEIRA': 'JOYCE',
  'RAFAEL OLIVEIRA LOPES':   'RAFAEL',
  'AUGUSTO CESAR':           'AUGUSTO',
  'THAIS NEPOMUCENO':        'THAIS',
  'BRUNO BENICIO SILVA':     'BRUNO',
  'ALEX ANDREI GASTALDI':    'ALEX',
  'ROSANE SANTOS':           'ROSANE',
  'SAMARA FERNANDES':        'SAMARA',
  'KEULLY BIANCA':           'KEULLY',

// ── CSV PARSER ───────────────────────────────────────────
function parseCSV(txt, vendor) {
  if (txt.charCodeAt(0) === 0xFEFF) txt = txt.slice(1); // BOM
  const lines = txt.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];

  const firstLine = lines[0];

  // Auto-detecta delimitador testando ambos e escolhendo o que gera mais colunas
  const tryDelim = (d) => {
    const res = []; let cur = ''; let q = false;
    for (let i = 0; i < firstLine.length; i++) {
      const ch = firstLine[i];
      if (ch === '"') { if (q && firstLine[i+1]==='"') { cur+='"'; i++; } else q=!q; }
      else if (ch === d && !q) { res.push(cur); cur=''; }
      else cur += ch;
    }
    res.push(cur);
    return res.length;
  };
  const colsComma     = tryDelim(',');
  const colsSemicolon = tryDelim(';');
  const delim = colsSemicolon > colsComma ? ';' : ',';
  console.log(`📋 ${vendor}: delim="${delim}" cols_vírgula=${colsComma} cols_ponto-vírgula=${colsSemicolon}`);

  const splitLine = (line) => {
    const res = []; let cur = ''; let q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (q && line[i+1]==='"') { cur+='"'; i++; } else q=!q; }
      else if (ch === delim && !q) { res.push(cur); cur=''; }
      else cur += ch;
    }
    res.push(cur);
    return res;
  };

  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim());
  DATA['__cols__' + vendor] = headers;

  const fi = (name) => {
    const n = name.toLowerCase();
    let i = headers.findIndex(h => h.toLowerCase() === n);
    if (i < 0) i = headers.findIndex(h => h.toLowerCase().includes(n.slice(0,6)));
    return i;
  };

  const iCl=fi(C.cl), iCn=fi(C.cn||'CLIENTE'), iDt=fi(C.dt), iVl=fi(C.vl), iCa=fi(C.ca),
        iCo=fi(C.co), iMo=fi(C.mo), iMo2=fi('MOTIVO'),
        iMeta=fi(C.meta), iMetaPos=fi(C.metaPos||'META POSIT.'), iPositMes=fi(C.positMes||'POSIT. MÊS'), iDv=fi(C.dv);

  // Debug: mostra colunas e índices no console
  console.log(`📋 ${vendor}:`, headers.join(' | '));
  console.log(`   DIAS VENDA="${C.dv}" → idx:${iDv} | DIAS CONTATO="${C.co}" → idx:${iCo}`);
  if (iDv >= 0) console.log(`   Ex. diasVenda row1:`, lines[1] ? splitLine(lines[1])[iDv] : '?');

  const get  = (c, i) => i >= 0 ? (c[i]||'').replace(/^"|"$/g,'').trim() : '';
  const num  = (s) => parseFloat((s||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitLine(lines[i]);
    const clientRaw = get(c, iCl);
    const dateStr   = get(c, iDt);
    if (!clientRaw && !dateStr) continue;
    const motivoNV  = get(c, iMo);
    const motivoMot = get(c, iMo2);
    rows.push({
      vendor,
      client:     clientRaw.replace(/\.0+$/, ''),
      clientName: get(c, iCn),
      dateRaw:    dateStr,
      date:       pDate(dateStr),
      value:      num(get(c, iVl)),
      meta:       num(get(c, iMeta)) * 1000,
      metaPos:    num(get(c, iMetaPos)),
      positMes:   num(get(c, iPositMes)),
      diasVenda:  get(c, iDv),
      carteira:   get(c, iCa),
      contato:    get(c, iCo),
      motivo:     [motivoNV, motivoMot].filter(v => v && v.trim()).join(' | '),
      _via:       'csv',
      _rawCols:   c,
      _iDv:       iDv,
      _iCo:       iCo,
    });
  }
  return rows;
}

function splitCSV(line) {
  const res = []; let cur = ''; let q = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { if (q && line[i+1]==='"') { cur+='"'; i++; } else q=!q; }
    else if (ch === ',' && !q) { res.push(cur); cur=''; }
    else cur += ch;
  }
  res.push(cur);
  return res;
}

// Converte resposta gviz JSON → rows
function parseGviz(resp, vendor) {
  const tbl = resp && resp.table;
  if (!tbl || !tbl.cols || !tbl.rows) return [];

  const cols = tbl.cols.map(c => (c.label || c.id || '').trim());
  DATA['__cols__' + vendor] = cols;

  const fi = (name) => {
    const n = name.toLowerCase();
    let i = cols.findIndex(h => h.toLowerCase() === n);
    if (i < 0) i = cols.findIndex(h => h.toLowerCase().includes(n.slice(0, 6)));
    return i;
  };

  const iCl=fi(C.cl), iCn=fi(C.cn||'CLIENTE'), iDt=fi(C.dt), iVl=fi(C.vl), iCa=fi(C.ca),
        iCo=fi(C.co), iMo=fi(C.mo), iMo2=fi('MOTIVO'),
        iMeta=fi(C.meta), iMetaPos=fi(C.metaPos||'META POSIT.'), iPositMes=fi(C.positMes||'POSIT. MÊS'), iDv=fi(C.dv);

  // Helpers para ler células gviz
  const gStr = (row, i) => {
    if (i < 0) return '';
    const cell = (row.c || [])[i];
    if (!cell) return '';
    const f = cell.f != null ? String(cell.f).trim() : '';
    const v = cell.v != null ? String(cell.v).trim() : '';
    return f || v;
  };
  // gStrFull: para campos com múltiplos valores (ex: "2;3;4;6") — lê todas as propriedades
  const gStrFull = (row, i) => {
    if (i < 0) return '';
    const cell = (row.c || [])[i];
    if (!cell) return '';
    // Tenta todas as propriedades possíveis do gviz
    for (const key of ['v', 'f', 'p']) {
      const val = cell[key];
      if (val != null && String(val).trim()) return String(val).trim();
    }
    return '';
  };
  const gStrRaw = (row, i) => {
    if (i < 0) return '';
    const cell = (row.c || [])[i];
    return (cell && cell.v != null) ? String(cell.v).trim() : '';
  };
  // lastVal: extrai último valor de campos com formato "X;Y;ZZ" (pega o mais recente)
  const lastVal = (s) => {
    if (!s || !s.trim()) return '';
    const parts = s.split(';').map(p => p.trim()).filter(Boolean);
    return parts.length > 0 ? parts[parts.length - 1] : s;
  };
  // gNum: lê número preferindo cell.f formatado (preserva separadores de milhar BR)
  const gNum = (row, i) => {
    if (i < 0) return 0;
    const cell = (row.c || [])[i];
    if (!cell || cell.v == null) return 0;
    // Sempre tenta cell.f primeiro — tem o número com formatação original da planilha
    const fStr = (cell.f != null) ? String(cell.f).trim() : '';
    if (fStr) {
      // Remove R$, espaços; remove pontos de milhar; troca vírgula decimal por ponto
      return parseFloat(fStr.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;
    }
    // Sem cell.f: usa cell.v (número JS nativo do gviz)
    if (typeof cell.v === 'number') return cell.v;
    return parseFloat(String(cell.v).replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')) || 0;
  };
  const gDate = (row, i) => {
    if (i < 0) return null;
    const cell = (row.c || [])[i];
    if (!cell) return null;
    if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
      const m = cell.v.match(/Date\((\d+),(\d+),(\d+)\)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
    }
    return pDate(cell.f ? String(cell.f) : (cell.v != null ? String(cell.v) : ''));
  };

  const rows = [];
  for (const row of tbl.rows) {
    const clientRaw = gStr(row, iCl);
    const dateStr   = gStr(row, iDt);
    if (!clientRaw && !dateStr) continue;
    const motivoNV  = gStr(row, iMo);
    const motivoMot = gStr(row, iMo2);
    rows.push({
      vendor,
      client:     clientRaw.replace(/\.0+$/, ''),
      clientName: gStr(row, iCn),
      dateRaw:    dateStr,
      date:       gDate(row, iDt),
      value:      gNum(row, iVl),
      meta:       gNum(row, iMeta) * 1000,
      metaPos:    gNum(row, iMetaPos),
      positMes:   gNum(row, iPositMes),
      diasVenda:  gStrFull(row, iDv),
      carteira:   gStr(row, iCa),
      contato:    gStrFull(row, iCo),
      motivo:     [motivoNV, motivoMot].filter(v => v && v.trim()).join(' | '),
    });
  }
  return rows;
}


// ── pDate — parser de data com hora para dedup preciso ─
function pDate(s){
  if(!s) return null;
  s = String(s).trim();
  // DD/MM/YYYY HH:MM ou MM/DD/YYYY HH:MM
  let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if(m){
    const y   = m[3].length===2 ? '20'+m[3] : m[3];
    const hh  = m[4] ? m[4].padStart(2,'0') : '00';
    const mm5 = m[5] ? m[5].padStart(2,'0') : '00';
    let day = parseInt(m[1]), mon = parseInt(m[2]);
    // Se mês > 12, está no formato MM/DD — troca
    if (mon > 12) { const tmp = day; day = mon; mon = tmp; }
    return new Date(`${y}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}T${hh}:${mm5}:00`);
  }
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return new Date(`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`);
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function pMoney(s){
  if(!s)return 0;
  return parseFloat(s.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.'))||0;
}

// Extrai todos os dias de uma string como "5-12-20-28"
function parseDays(str) {
  if (!str || str === '0') return [];
  return String(str).split(/[-;,]/).map(d => parseInt(d.trim())).filter(d => !isNaN(d) && d > 0);
}

// Retorna o dia mais recente presente nos dados (em DIAS VENDA ou DIAS CONTATO)
// da DATA ENVIO mais recente
function getMaxDay(rows) {
  // Pega a data mais recente
  const maxDate = rows.reduce((max, r) => {
    const d = r.date ? r.date.toISOString().slice(0,10) : '';
    return d > max ? d : max;
  }, '');
  if (!maxDate) return null;
  // Entre os registros com data mais recente, pega o maior dia de DIAS VENDA/CONTATO
  const recentRows = rows.filter(r => r.date && r.date.toISOString().slice(0,10) === maxDate);
  let maxDay = 0;
  recentRows.forEach(r => {
    const dvDays = parseDays(r.diasVenda);
    const coDays = parseDays(r.contato);
    [...dvDays, ...coDays].forEach(d => { if (d > maxDay) maxDay = d; });
  });
  return maxDay > 0 ? { maxDate, maxDay } : null;
}

// Filtra por DATA ENVIO — usado para Não Venda que não tem DIAS VENDA/CONTATO
function fltPeriodByDate(rows){
  if(PERIOD==='all') return rows;
  if(PERIOD==='hoje'){
    const hoje = new Date().toISOString().slice(0,10);
    return rows.filter(r => r.date && r.date.toISOString().slice(0,10) === hoje);
  }
  if(PERIOD==='custom'){
    return rows.filter(r=>{
      if(!r.date) return false;
      if(D_FROM && r.date<D_FROM) return false;
      if(D_TO   && r.date>D_TO)   return false;
      return true;
    });
  }
  if(PERIOD==='mtd'){
    const now = new Date();
    const ini = new Date(now.getFullYear(), now.getMonth(), 1);
    return rows.filter(r => r.date && r.date >= ini);
  }
  // Últ. Dia e N dias — usa DATA ENVIO mais recente
  const maxDate = rows.reduce((max, r) => {
    const d = r.date ? r.date.toISOString().slice(0,10) : '';
    return d > max ? d : max;
  }, '');
  if(PERIOD==='1'){
    return rows.filter(r => r.date && r.date.toISOString().slice(0,10) === maxDate);
  }
  const cut = new Date(Date.now() - parseInt(PERIOD)*864e5);
  return rows.filter(r => r.date && r.date >= cut);
}

function fltPeriod(rows){
  if(PERIOD==='all') return rows;

  if(PERIOD==='hoje'){
    // Hoje = clientes que têm o dia do mês de hoje em DIAS CONTATO ou DIAS VENDA
    const diaHoje = new Date().getDate();
    const info = getMaxDay(rows);
    const maxDate = info ? info.maxDate : null;
    return rows.filter(r => {
      if (maxDate && r.date && r.date.toISOString().slice(0,10) !== maxDate) return false;
      const dvDays = parseDays(r.diasVenda);
      const coDays = parseDays(r.contato);
      return dvDays.includes(diaHoje) || coDays.includes(diaHoje);
    });
  }

  if(PERIOD==='custom'){
    return rows.filter(r=>{
      if(!r.date) return false;
      if(D_FROM && r.date<D_FROM) return false;
      if(D_TO   && r.date>D_TO)   return false;
      return true;
    });
  }

  if(PERIOD==='mtd'){
    const now = new Date();
    const ini = new Date(now.getFullYear(), now.getMonth(), 1);
    return rows.filter(r => r.date && r.date >= ini);
  }

  // Últ. Dia = dia anterior ao maior dia numérico em DIAS VENDA/CONTATO
  if(PERIOD==='1'){
    const info = getMaxDay(rows);
    if (!info) return rows;
    const prevDay = info.maxDay - 1;
    if (prevDay <= 0) return [];
    return rows.filter(r => {
      if (!r.date || r.date.toISOString().slice(0,10) !== info.maxDate) return false;
      const dvDays = parseDays(r.diasVenda);
      const coDays = parseDays(r.contato);
      return dvDays.includes(prevDay) || coDays.includes(prevDay);
    });
  }

  // N dias: últimos N dias numéricos em DIAS VENDA/CONTATO
  if(!isNaN(parseInt(PERIOD))){
    const info = getMaxDay(rows);
    if (!info) return rows;
    const cutDay = info.maxDay - parseInt(PERIOD) + 1;
    return rows.filter(r => {
      if (!r.date || r.date.toISOString().slice(0,10) !== info.maxDate) return false;
      const dvDays = parseDays(r.diasVenda);
      const coDays = parseDays(r.contato);
      return [...dvDays, ...coDays].some(d => d >= cutDay && d <= info.maxDay);
    });
  }

  return rows;
}

// ── STATUS — mesma prioridade dos KPIs ───────────────
function status(r){
  if(r.value>0)                                          return 'positivado';
  if(r.motivo&&r.motivo.trim())                          return 'nao_venda';
  if(r.contato&&r.contato.trim())                        return 'em_contato';
  if(r.carteira&&r.carteira.toLowerCase().trim()==='sim')return 'em_carteira';
  return null;
}

// Keep most recent row per (vendor+client)
function dedup(rows){
  const m=new Map();
  for(const r of rows){
    const k=`${r.vendor}::${(r.client||'').toLowerCase()}`;
    const ex=m.get(k);
    if(!ex){m.set(k,r);continue;}
    const a=ex.date?ex.date.getTime():0;
    const b=r.date?r.date.getTime():0;
    if(b>a)m.set(k,r);
  }
  return Array.from(m.values());
}

  const getRaw = (vendor) => (DATA[vendor] || []).map(r => ({...r, vendor}));

    ? getGroupVendors().flatMap(v => getRaw(v))
    : getRaw(ACTIVE);

  // ── Deduplica por (vendor + cliente) mantendo data mais recente — para KPIs de contagem
  const dd   = dedup(allRaw);
  const rows = fltPeriod(dd);

  // ── Dedup GLOBAL por cliente (sem vendor) — 1 linha por cliente, a mais recente
  const dedupGlobalFn = (arr) => {
    const m = new Map();
    for (const r of arr) {
      const k = (r.client||'').toLowerCase().trim();
      if (!k) continue;
      const ex = m.get(k);
      if (!ex) { m.set(k, r); continue; }
      const a = ex.date ? ex.date.getTime() : 0;
      const b =  r.date ?  r.date.getTime() : 0;
      if (b > a) m.set(k, r);
    }
    return Array.from(m.values());
  };
  const rowsFinanceiro = dedupGlobalFn(rows);

  // ── FATURAMENTO: soma FAT.MÊS de todos os clientes positivados (FAT.MÊS > 0)
  // Independente de DIAS VENDA — usa registro mais recente por cliente
  const hasDiasVenda = (r) => { const dv = String(r.diasVenda||'').trim(); return dv && dv !== '0'; };

  const totMeta = rowsFinanceiro.reduce((a,r) => a + (r.meta || 0), 0);

  const cntVen  = rowsConVen.filter(r => { const dv = String(r.diasVenda||'').trim(); return dv && dv !== '0'; }).length;

  const refDate = evoRaw.reduce((max, r) => r.date && r.date > max ? r.date : max, new Date(0));
  const refYear  = refDate.getFullYear();
  const refMonth = refDate.getMonth(); // 0-based

  requestAnimationFrame(()=>{

// ── EVO CHART — linhas de Contatos e Positivados por data ────────

  const labels    = dKeys.map(d => {
    const dt = new Date(d+'T12:00:00');

  });
  const dataContat = dKeys.map(d => byD[d].contato    || 0);

// ── FUNIL VISUAL ──────────────────────────────────────
function buildFunil(cntCar, cntCon, cntVen, cntNav, total){
  const el = document.getElementById('funil-wrap');
  if (!el) return;

  const stages = [
    { lbl:'Carteira',  val:cntCar, col:'#b87a00', ico:'💼' },
    { lbl:'Contato',   val:cntCon, col:'#1a3a8c', ico:'📞' },
    { lbl:'Venda',     val:cntVen, col:'#1a8c4e', ico:'🛒' },
    { lbl:'Não Venda', val:cntNav, col:'#cc1a1a', ico:'❌' },
  ];

  const max = Math.max(...stages.map(s=>s.val), 1);

  el.innerHTML = stages.map((s, i) => {
    const pct  = total > 0 ? ((s.val / total) * 100).toFixed(0) : 0;
    const barW = ((s.val / max) * 100).toFixed(0);
    // Funil: cada estágio é um pouco mais estreito
    const marginPx = i * 10;
    return `<div style="margin:0 ${marginPx}px;transition:margin .4s">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:13px">${s.ico}</span>
          <span style="font-size:11px;font-weight:700;color:${s.col};text-transform:uppercase;letter-spacing:.5px">${s.lbl}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'Roboto Mono',monospace;font-size:18px;font-weight:700;color:var(--text)">${s.val}</span>
          <span style="font-family:'Roboto Mono',monospace;font-size:10px;color:var(--text3)">${pct}%</span>
        </div>
      </div>
      <div style="height:8px;background:var(--gray);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${s.col};border-radius:6px;transition:width .8s cubic-bezier(.23,1,.32,1)"></div>
      </div>
    </div>`;
  }).join('');
}

// ── MOTIVOS NÃO VENDA ─────────────────────────────────
function buildMotivos(rows) {
  const el = document.getElementById('motivos-wrap');
  if (!el) return;

  // Conta ocorrências de cada motivo
  const counts = {};
  rows.forEach(r => {
    const m = (r.motivo || '').trim();
    if (!m) return;
    // Separa múltiplos motivos por " | "
    m.split('|').forEach(part => {
      const p = part.trim();
      if (p && !['SIM','NÃO','NAO','S','N'].includes(p.toUpperCase())) counts[p] = (counts[p] || 0) + 1;
    });
  });

  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,8);
  if (!sorted.length) {
    el.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center">Nenhum motivo registrado</div>`;
    return;
  }

  const max = sorted[0][1];
  const colors = ['#cc1a1a','#e05c1a','#d4860a','#b87a00','#8a6500','#6b4f00','#4a3800','#2e2400'];

  el.innerHTML = sorted.map(([motivo, cnt], i) => {
    const pct  = ((cnt / rows.filter(r=>r.motivo&&r.motivo.trim()).length) * 100).toFixed(0);
    const barW = ((cnt / max) * 100).toFixed(0);
    const col  = colors[i] || '#888';
    return `<div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px" title="${motivo}">${motivo}</span>
        <span style="font-family:'Roboto Mono',monospace;font-size:11px;font-weight:700;color:${col};margin-left:6px">${cnt} <span style="color:var(--text3);font-weight:400">(${pct}%)</span></span>
      </div>
      <div style="height:6px;background:var(--gray);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${barW}%;background:${col};border-radius:4px;transition:width .8s cubic-bezier(.23,1,.32,1)"></div>
      </div>
    </div>`;
  }).join('');
}

// ── TABLE ─────────────────────────────────────────────
function drawTbl(rows, noUpdate){
  if(!noUpdate) { _rows = rows; _activeStg = 'all'; }
  const tb = document.getElementById('tb'); if(!tb) return;
  const showV = ACTIVE==='all';
  const sm = {positivado:STAGES[0], nao_venda:STAGES[1], em_contato:STAGES[2], em_carteira:STAGES[3]};

  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--text3)">Nenhum dado encontrado</td></tr>`;
    return;
  }

  tb.innerHTML = rows.slice(0,300).map(r => {
    const sk  = status(r);
    const st  = sk ? sm[sk] : null;
    const bdg = st
      ? `<span class="badge" style="background:${st.bg};color:${st.col}">${st.lbl}</span>`
      : `<span class="badge" style="background:#f0f0f0;color:#aaa">—</span>`;
    const car = (r.carteira||'').toLowerCase().trim();
    return `<tr>
      <td>
        ${r.clientName ? `<div style="font-weight:600">${r.clientName}</div><div style="font-size:10px;color:var(--text3)">${r.client||''}</div>` : (r.client||'—')}
      </td>
      ${showV?`<td style="font-weight:700;color:var(--blue)">${r.vendor}</td>`:''}
      <td>${bdg}</td>
      <td style="font-family:'Roboto Mono',monospace;color:${r.value>0?'#1a8c4e':'var(--text2)'};font-weight:${r.value>0?700:400}">${r.value>0?fBRL(r.value):'—'}</td>
      <td style="font-family:'Roboto Mono',monospace;color:var(--text3)">${r.dateRaw||'—'}</td>
      <td>${car==='sim' ? `<span class="badge" style="background:#fff3cd;color:#b87a00">SIM</span>` : `<span style="color:var(--text3)">—</span>`}</td>
      <td style="font-family:'Roboto Mono',monospace">${r.contato||'—'}</td>
      <td style="font-family:'Roboto Mono',monospace;color:#1a8c4e">${r.diasVenda||'—'}</td>
      <td style="color:var(--red);font-weight:${r.motivo?600:400}">${r.motivo||'—'}</td>
    </tr>`;
  }).join('');

  if(rows.length>300)
    tb.innerHTML+=`<tr><td colspan="9" style="text-align:center;padding:14px;color:var(--text3);font-size:12px">Exibindo 300 de ${rows.length} registros</td></tr>`;
}
function fltTbl(q){
  applyTblFilters(q, _activeStg);
}

let _activeStg = 'all';

function setStgFilter(stg, el){
  _activeStg = stg;
  document.querySelectorAll('.stg-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyTblFilters(document.getElementById('tq')?.value || '', stg);
}

function applyTblFilters(q, stg){
  let filtered = _rows;
  // Filtro de etapa
  if(stg && stg !== 'all'){
    filtered = filtered.filter(r => status(r) === stg);
  }
  // Filtro de texto
  if(q && q.trim()){
    const lq = q.toLowerCase();
    filtered = filtered.filter(r =>
      (r.client||'').toLowerCase().includes(lq) ||
      (r.vendor||'').toLowerCase().includes(lq) ||
      (r.motivo||'').toLowerCase().includes(lq)
    );
  }
  drawTbl(filtered, true); // true = não atualiza _rows
}

        ${multiRows.map(([client, rows]) => {
          // Simula exatamente o que o dedup faz
          let selected = rows[0];
          rows.forEach(r => {
            const a = selected.date ? selected.date.getTime() : 0;
            const b = r.date        ? r.date.getTime()        : 0;
            if (b > a) selected = r;
          });
          const timestamps = rows
            .map(r => r.dateRaw || '—')
            .sort()
            .join('<br>');
          const dv = String(selected.diasVenda||'').trim();
          const dvOk = dv && dv !== '0';
          return `<tr style="border-bottom:1px solid rgba(255,255,255,.05)">
            <td style="padding:5px 8px;color:#fff;font-weight:700">${rows[0].client}</td>
            <td style="padding:5px 8px;text-align:center;color:#ffb800">${rows.length}</td>
            <td style="padding:5px 8px;color:#888;font-size:10px">${timestamps}</td>
            <td style="padding:5px 8px;color:#00e5a0;font-size:10px">${selected.dateRaw||'—'}</td>
            <td style="padding:5px 8px;text-align:center;color:${selected.value>0?'#00e5a0':'#666'};font-weight:700">${selected.value>0?fBRL(selected.value):'—'}</td>
            <td style="padding:5px 8px;text-align:center;color:${dvOk?'#00e5a0':'#666'}">${selected.diasVenda||'—'}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>`;
  }

  // ── BLOCO 2: Verificação do resultado final ──────────────────────
  const dedupFn = (rows, keyFn) => {
    const m = new Map();
    rows.forEach(r => {
      const k = keyFn(r);
      if (!k) return;
      const ex = m.get(k);
      if (!ex) { m.set(k, r); return; }
      const a = ex.date ? ex.date.getTime() : 0;
      const b =  r.date ?  r.date.getTime() : 0;
      if (b > a) m.set(k, r);
    });
    return Array.from(m.values());
  };

  const step1 = dedupFn(allRawD, r => `${r.vendor}::${(r.client||'').toLowerCase()}`);
  const step2 = dedupFn(step1,   r => (r.client||'').toLowerCase().trim());
  const hasDV = r => { const dv = String(r.diasVenda||'').trim(); return dv && dv !== '0'; };
  const step2DV = step2.filter(hasDV);

  const metaTotal = step2.reduce((a,r)=>a+(r.meta||0),0);
  const fatTotal  = step2.filter(r=>r.value>0).reduce((a,r)=>a+(r.value||0),0);
  const atingDbg  = metaTotal > 0 ? Math.round((fatTotal/metaTotal)*100) : null;

  // Top 10 META para ver se vêm corretas
  const top10meta = [...step2].filter(r=>r.meta>0).sort((a,b)=>(b.meta||0)-(a.meta||0)).slice(0,10);

  html += `<div style="padding:12px;background:rgba(0,229,160,.05);border-radius:8px;border:1px solid rgba(0,229,160,.3)">
    <div style="color:#00e5a0;font-weight:700;margin-bottom:10px">📊 RESULTADO FINAL</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
      <div style="background:rgba(255,255,255,.04);padding:10px;border-radius:6px">
        <div style="color:#888;font-size:10px;font-weight:700;margin-bottom:4px">CLIENTES ÚNICOS</div>
        <div style="color:#fff;font-size:16px;font-weight:700">${step2.length}</div>
      </div>
      <div style="background:rgba(0,229,160,.08);padding:10px;border-radius:6px;border:1px solid rgba(0,229,160,.3)">
        <div style="color:#00e5a0;font-size:10px;font-weight:700;margin-bottom:4px">✅ FATURAMENTO (FAT > 0)</div>
        <div style="color:#00e5a0;font-size:14px;font-weight:800">${fBRL(fatTotal)}</div>
        <div style="color:#888;font-size:10px">${step2.filter(r=>r.value>0).length} clientes</div>
      </div>
      <div style="background:rgba(58,111,216,.08);padding:10px;border-radius:6px;border:1px solid rgba(58,111,216,.3)">
        <div style="color:#3a6fd8;font-size:10px;font-weight:700;margin-bottom:4px">META TOTAL</div>
        <div style="color:#3a6fd8;font-size:14px;font-weight:800">${fBRL(metaTotal)}</div>
        <div style="color:#888;font-size:10px">Ating: ${atingDbg!=null?atingDbg+'%':'—'}</div>
      </div>
    </div>
    <div style="color:#ffb800;font-weight:700;margin-bottom:6px;font-size:11px">Top 10 maiores META FAT. (raw):</div>
    <table style="width:100%;border-collapse:collapse;font-size:10px">
      <tr style="color:#888"><th style="text-align:left;padding:3px 6px">Cliente</th><th style="padding:3px 6px">META raw</th><th style="padding:3px 6px">FAT.MÊS raw</th><th style="padding:3px 6px">Data</th></tr>
      ${top10meta.map(r=>`<tr style="border-top:1px solid rgba(255,255,255,.04)">
        <td style="padding:3px 6px;color:#fff">${r.client}</td>
        <td style="padding:3px 6px;color:#3a6fd8;font-weight:700">${fBRL(r.meta)}</td>
        <td style="padding:3px 6px;color:#00e5a0">${fBRL(r.value)}</td>
        <td style="padding:3px 6px;color:#666">${r.dateRaw||'—'}</td>
      </tr>`).join('')}
    </table>
  </div>`;

  html += `</div>`;
  el.innerHTML = html;
  document.getElementById('dbg-overlay').style.display = 'block';
}
</script>
</body>
</html>
